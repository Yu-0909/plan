<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-do</title>
  <style>
    @font-face {
      font-family: '辰宇落雁體';
      src: url('https://raw.githubusercontent.com/Yu-0909/TSUKISHIMA/main/ChenYuluoyan-Thin-Monospaced.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    :root{
      --bg1:#fff4fb;
      --card:#fff6fc;
      --accent:#e26a9a;
      --muted:#6b1f4a;
      --soft:#ffdfee;
      --shadow-pink:rgba(226,106,154,0.24);
      --shadow-soft-pink:rgba(255,182,193,0.3);
    }
    *{box-sizing:border-box;}
    body{
      margin:0;
      font-family: "辰宇落雁體", "Noto Sans TC", sans-serif;
      background: linear-gradient(135deg, var(--bg1), #e8f6ff);
      color:#3c1f2b;
      display:flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 40px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    header{
      text-align:center;
      margin-top:18px;
      user-select:none;
    }
    h1{
      color: var(--accent);
      margin:6px 0 0;
      font-size: 32px;
      letter-spacing: 0.04em;
      font-weight: 700;
      text-shadow: 1px 1px 4px var(--shadow-pink);
    }
    .topbar{
      width: 100%;
      max-width: 1100px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 12px 18px;
      margin-top: 10px;
      font-size: 15px;
      color: var(--muted);
      font-weight: 600;
    }
    .badges{
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .badge{
      background:#fff;
      padding: 8px 14px;
      border-radius: 20px;
      box-shadow: 0 6px 14px var(--shadow-soft-pink);
      font-size: 15px;
      user-select:none;
      transition: background-color 0.3s ease;
      cursor: default;
    }
    .badge:hover {
      background-color: var(--soft);
    }

    /* controls */
    .controls{
      width: 100%;
      max-width: 1100px;
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      padding: 14px 12px 18px;
      background: #fff8fc;
      border-radius: 16px;
      box-shadow: 0 8px 28px var(--shadow-soft-pink);
      user-select:none;
    }
    input[type="text"], input[type="number"], input[type="color"]{
      padding: 10px 14px;
      border-radius: 14px;
      border: 1.5px solid #f0d7e0;
      outline:none;
      font-size: 15px;
      font-family: "辰宇落雁體", "Noto Sans TC", sans-serif;
      color: #4a2e44;
      transition: border-color 0.3s ease;
    }
    input[type="text"]:focus, input[type="number"]:focus, input[type="color"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 8px var(--shadow-pink);
    }
    button{
      border:none;
      border-radius: 14px;
      padding: 10px 18px;
      font-size: 15px;
      cursor: pointer;
      font-weight: 700;
      font-family: "辰宇落雁體", "Noto Sans TC", sans-serif;
      user-select:none;
      transition: background-color 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 6px 14px var(--shadow-pink);
    }
    button.primary{
      background: var(--accent);
      color: white;
      box-shadow: 0 8px 18px var(--shadow-pink);
    }
    button.primary:hover {
      background: #cf6087;
      box-shadow: 0 10px 24px rgba(206,83,135,0.6);
    }
    button.ghost{
      background: transparent;
      color: var(--muted);
      border: 1.5px solid rgba(107,31,74,0.2);
      box-shadow: none;
      font-weight: 600;
    }
    button.ghost:hover {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 10px var(--shadow-pink);
    }
    .small {
      font-size: 13px;
      color: #a65d82;
      user-select:none;
    }

    /* board */
    .board{
      width: 100%;
      max-width: 1100px;
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      padding: 18px 0;
      user-select:none;
    }
    .card{
      width: 150px;
      height: 150px;
      border-radius: 9999px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 14px 10px 10px;
      cursor: pointer;
      box-shadow: 0 10px 28px var(--shadow-pink);
      transition: transform 0.2s ease, box-shadow 0.3s ease;
      position: relative;
      color: #591c45;
      font-weight: 700;
      font-size: 17px;
      user-select:none;
    }
    .card:hover{
      transform: translateY(-8px) scale(1.06);
      box-shadow: 0 14px 38px rgba(226, 106, 154, 0.5);
    }
    .card .title{
      font-weight: 700;
      color: var(--muted);
      font-size: 17px;
      margin-bottom: 8px;
      text-shadow: 0 0 2px rgba(255,255,255,0.9);
      user-select:text;
    }
    .card .prog{
      color: #7b486d;
      font-size: 15px;
      font-weight: 600;
      user-select:none;
    }
    .card input[type="color"]{
      position: absolute;
      top: 8px;
      right: 8px;
      width: 32px;
      height: 32px;
      border-radius: 12px;
      border: none;
      padding: 0;
      cursor: pointer;
    }
    .card .delete-task-btn {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: #f38181;
      border-radius: 12px;
      border: none;
      width: 28px;
      height: 28px;
      font-size: 18px;
      color: white;
      font-weight: 700;
      line-height: 24px;
      cursor: pointer;
      box-shadow: 0 4px 8px rgba(243,129,129,0.7);
      user-select:none;
      transition: background-color 0.3s ease;
    }
    .card .delete-task-btn:hover {
      background: #d95555;
    }

    /* detail modal (白色方匡) */
    .detail{
      position: fixed;
      left: 50%;
      top: 14%;
      transform: translateX(-50%);
      width: 380px;
      max-width: 95%;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 22px 58px rgba(0,0,0,0.22);
      display: none;
      z-index: 999;
      padding: 22px 24px;
      font-family: "辰宇落雁體", "Noto Sans TC", sans-serif;
      color: #5a2d49;
      user-select:text;
    }
    .detail h3{
      margin: 0 0 8px;
      color: var(--accent);
      font-weight: 800;
      font-size: 24px;
      letter-spacing: 0.04em;
      user-select:text;
    }
    .detail .meta{
      font-size: 15px;
      color: #7b4a6f;
      margin-bottom: 14px;
      font-weight: 600;
      user-select:none;
    }
    .detail .note{
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1.5px solid #eee;
      margin-bottom: 14px;
      font-size: 15px;
      font-family: "辰宇落雁體", "Noto Sans TC", sans-serif;
      color: #6a3e61;
      resize: vertical;
      min-height: 48px;
      user-select:text;
    }
    .detail .btns{
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-bottom: 12px;
    }
    .logs{
      max-height: 240px;
      overflow-y: auto;
      margin-top: 10px;
      border-top: 1.5px dashed #f0d7e0;
      padding-top: 12px;
      font-size: 14px;
      color: #5a2d49;
      font-weight: 500;
      user-select:text;
    }
    .log-item{
      padding: 8px 6px 6px;
      border-bottom: 1px solid #fafafa;
      line-height: 1.3em;
    }
    .log-item > div:first-child{
      font-size: 13px;
      color: #ad7d9c;
      font-weight: 400;
      margin-bottom: 4px;
      user-select:none;
    }

    /* 細項刪除按鈕 */
    .log-item .del-log-btn {
      float: right;
      background: #f38181;
      border: none;
      border-radius: 10px;
      padding: 2px 8px;
      font-size: 13px;
      color: white;
      font-weight: 700;
      cursor: pointer;
      transition: background-color 0.3s ease;
      user-select:none;
    }
    .log-item .del-log-btn:hover {
      background: #d95555;
    }

    /* history */
    .history{
      width: 100%;
      max-width: 1100px;
      margin-top: 20px;
      padding: 18px 18px 24px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 18px;
      box-shadow: 0 10px 28px rgba(226,106,154,0.15);
      font-family: "辰宇落雁體", "Noto Sans TC", sans-serif;
      color: #5e3b5a;
      user-select:text;
    }
    .history h3{
      margin: 0 0 12px;
      color: var(--muted);
      font-weight: 700;
      font-size: 22px;
      user-select:none;
    }
    .history-week{
      background: #fff7fb;
      padding: 14px 16px;
      border-radius: 14px;
      margin-bottom: 14px;
      box-shadow: 0 6px 18px rgba(226,106,154,0.14);
    }
    .history-week > div:first-child {
      font-weight: 700;
      font-size: 17px;
      margin-bottom: 10px;
      user-select:none;
    }
    .history-week ul {
      padding-left: 20px;
      margin: 6px 0 0 4px;
      color: #88527a;
      font-size: 14px;
      line-height: 1.3em;
    }

    /* responsive */
    @media(max-width:520px){
      .card{ width: 130px; height: 130px; font-size: 15px; }
      .detail{ width: 94%; top: 10%; }
      .controls{ font-size: 14px; }
      input[type="text"], input[type="number"], input[type="color"], button {
        font-size: 14px;
      }
      .badge { font-size: 13px; padding: 6px 10px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>To-do</h1>
  </header>

  <div class="topbar">
    <div class="badges">
      <div class="badge">日期：<span id="today">--</span></div>
      <div class="badge">時間：<span id="clock">--</span></div>
    </div>
    <div class="badges">
      <div class="badge">第 <span id="weekNo">--</span> 週</div>
      <div class="badge">連勝週數：<span id="streak">0</span> 週</div>
      <div class="badge">完成週數：<span id="doneWeeks">0</span></div>
      <div class="badge">獎勵金：$<span id="money">0</span></div>
    </div>
  </div>

  <div class="controls">
    <input id="taskName" type="text" placeholder="任務名稱（例如：數學）" />
    <input id="taskTotal" type="number" min="1" value="7" style="width:80px" />
    <input id="taskReward" type="number" min="0" value="10" style="width:100px" /> <span class="small">每次 $</span>
    <input id="taskColor" type="color" value="#ffd6e8" />
    <button id="addTaskBtn" class="primary">新增任務</button>
    <input id="weeklyRewardInput" type="number" value="500" style="width:110px" />
    <span class="small">每週完成獎勵金</span>
    <button id="exportBtn" class="ghost">匯出備份</button>
    <input id="importFile" type="file" style="display:none" />
    <button id="importBtn" class="ghost">匯入備份</button>
  </div>

  <div class="board" id="board"></div>

  <!-- detail modal -->
  <div class="detail" id="detail" role="dialog" aria-modal="true" aria-labelledby="detailTitle" tabindex="-1">
    <h3 id="detailTitle">任務</h3>
    <div class="meta"><span id="detailProg">0 / 0</span></div>
    <input id="noteInput" class="note" placeholder="輸入本次完成內容（可留空）" />
    <div class="btns">
      <button id="completeOneBtn" class="primary">✅ 完成一次</button>
      <button id="closeDetailBtn" class="ghost">關閉</button>
    </div>
    <div class="logs" id="logs"></div>
  </div>

  <div class="history" id="history" aria-live="polite">
    <h3>歷史紀錄（每週）</h3>
    <div id="historyList"></div>
  </div>

<script>
/* ---------- DATA 結構（localStorage）與常數 ---------- */
const STORAGE_KEY = 'hirano_weekly_v1';
const BASE_WEEK_START = '2025-07-28'; // 以此日所在週為第1週
const MS_PER_DAY = 24*60*60*1000;
const MS_PER_WEEK = 7*MS_PER_DAY;

/* 取得台灣時間（可靠）：將本機時間轉成 UTC 再加 +8 */
function getTaiwanNow(){
  const local = new Date();
  const utc = local.getTime() + (local.getTimezoneOffset() * 60000);
  return new Date(utc + 8*3600000);
}

/* 以日期計算週號（BASE_WEEK_START 當週為第1週） */
function getWeekNumberFromDate(date){
  const base = new Date(BASE_WEEK_START + 'T00:00:00+08:00');
  const diff = date.getTime() - base.getTime();
  if(diff < 0) return 0;
  return Math.floor(diff / MS_PER_WEEK) + 1;
}

/* 週時間範圍字串 */
function getWeekRange(weekNo){
  const base = new Date(BASE_WEEK_START + 'T00:00:00+08:00');
  const start = new Date(base.getTime() + (weekNo-1)*MS_PER_WEEK);
  const end = new Date(start.getTime() + 6*MS_PER_DAY);
  function f(d){ return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`; }
  return `${f(start)} - ${f(end)}`;
}

/* save / load */
function loadData(){
  const raw = localStorage.getItem(STORAGE_KEY);
  if(raw) return JSON.parse(raw);
  return {
    meta: { startDate: BASE_WEEK_START, weeklyReward: 500, lastProcessedWeek: 0 },
    tasks: [],
    stats: { money: 0, doneWeeks: 0, streak: 0 },
    history: {}
  };
}
function saveData(data){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

/* 初始化資料 */
let data = loadData();

/* ---------- DOM Elements ---------- */
const board = document.getElementById('board');
const weekNoElem = document.getElementById('weekNo');
const todayElem = document.getElementById('today');
const clockElem = document.getElementById('clock');
const streakElem = document.getElementById('streak');
const doneWeeksElem = document.getElementById('doneWeeks');
const moneyElem = document.getElementById('money');

const taskNameInput = document.getElementById('taskName');
const taskTotalInput = document.getElementById('taskTotal');
const taskRewardInput = document.getElementById('taskReward');
const taskColorInput = document.getElementById('taskColor');
const addTaskBtn = document.getElementById('addTaskBtn');

const weeklyRewardInput = document.getElementById('weeklyRewardInput');

const detail = document.getElementById('detail');
const detailTitle = document.getElementById('detailTitle');
const detailProg = document.getElementById('detailProg');
const noteInput = document.getElementById('noteInput');
const completeOneBtn = document.getElementById('completeOneBtn');
const closeDetailBtn = document.getElementById('closeDetailBtn');
const logsDiv = document.getElementById('logs');

const historyList = document.getElementById('historyList');

const exportBtn = document.getElementById('exportBtn');
const importBtn = document.getElementById('importBtn');
const importFile = document.getElementById('importFile');

/* ---------- 功能變數 ---------- */
let currentWeekNo = 0;
let currentTaskId = null;

/* ---------- 日期時間顯示 ---------- */
function updateDateTime(){
  const now = getTaiwanNow();
  currentWeekNo = getWeekNumberFromDate(now);
  weekNoElem.textContent = currentWeekNo || '--';

  const y = now.getFullYear();
  const m = now.getMonth()+1;
  const d = now.getDate();
  todayElem.textContent = `${y}/${m.toString().padStart(2,'0')}/${d.toString().padStart(2,'0')}`;

  const hh = now.getHours().toString().padStart(2,'0');
  const mm = now.getMinutes().toString().padStart(2,'0');
  const ss = now.getSeconds().toString().padStart(2,'0');
  clockElem.textContent = `${hh}:${mm}:${ss}`;
}

/* ---------- 週一 5:00 週切換重置 ---------- */
/*
  判斷是否跨週（以週一05:00為分界），若跨週則重置當週完成狀態，並存歷史紀錄
*/
function checkWeeklyReset(){
  const now = getTaiwanNow();

  // 本週週一05:00
  const base = new Date(BASE_WEEK_START + 'T05:00:00+08:00');
  const thisWeekMonday5 = new Date(base.getTime() + (currentWeekNo-1)*MS_PER_WEEK);

  if(data.meta.lastProcessedWeek < currentWeekNo){
    // 先存歷史，依據 lastProcessedWeek 對應資料
    if(data.meta.lastProcessedWeek > 0) {
      saveHistoryWeek(data.meta.lastProcessedWeek);
    }
    // 重置本週完成紀錄
    data.tasks.forEach(t=>{
      t.done = 0;
      t.logs = [];
    });
    data.meta.lastProcessedWeek = currentWeekNo;
    saveData(data);
  }
}

/* 儲存指定週的歷史紀錄 */
function saveHistoryWeek(weekNo){
  if(weekNo <= 0) return;

  // 只儲存本週完成的任務及次數、紀錄文字與時間
  const record = {
    dateRange: getWeekRange(weekNo),
    tasks: []
  };
  data.tasks.forEach(t=>{
    if(t.done > 0){
      record.tasks.push({
        id: t.id,
        name: t.name,
        done: t.done,
        total: t.total,
        reward: t.reward,
        color: t.color,
        logs: t.logs || []
      });
    }
  });
  if(Object.keys(record.tasks).length === 0){
    // 該週無完成紀錄，不存
    return;
  }
  data.history[weekNo] = record;
  saveData(data);
}

/* ---------- 重新渲染版面 ---------- */
function renderBoard(){
  board.innerHTML = '';
  if(data.tasks.length === 0){
    board.innerHTML = '<p style="color:#9e4b74; font-weight:600; user-select:none;">目前沒有任務，請新增！</p>';
    return;
  }
  data.tasks.forEach(task=>{
    const card = document.createElement('div');
    card.classList.add('card');
    card.style.backgroundColor = task.color || '#ffd6e8';
    card.setAttribute('data-id', task.id);
    card.setAttribute('tabindex', '0');
    card.title = `${task.name} ${task.done} / ${task.total}`;

    // 文字區
    const title = document.createElement('div');
    title.classList.add('title');
    title.textContent = task.name + ` （${task.total}次）`;
    card.appendChild(title);

    // 完成數量顯示
    const prog = document.createElement('div');
    prog.classList.add('prog');
    prog.textContent = `${task.done} / ${task.total}`;
    card.appendChild(prog);

    // 顏色選擇器
    const colorInput = document.createElement('input');
    colorInput.type = 'color';
    colorInput.value = task.color || '#ffd6e8';
    colorInput.title = '變更任務顏色';
    colorInput.addEventListener('click', e=>{
      e.stopPropagation();
    });
    colorInput.addEventListener('input', e=>{
      const newColor = e.target.value;
      task.color = newColor;
      saveData(data);
      renderBoard();
      if(currentTaskId === task.id){
        detail.style.backgroundColor = newColor;
      }
    });
    card.appendChild(colorInput);

    // 刪除任務按鈕
    const delBtn = document.createElement('button');
    delBtn.classList.add('delete-task-btn');
    delBtn.title = '刪除此任務';
    delBtn.textContent = '×';
    delBtn.addEventListener('click', e=>{
      e.stopPropagation();
      if(confirm(`確定刪除任務「${task.name}」？ 此動作無法復原。`)){
        deleteTask(task.id);
      }
    });
    card.appendChild(delBtn);

    // 點擊卡片展開細項
    card.addEventListener('click', ()=>{
      openDetail(task.id);
    });
    card.addEventListener('keydown', e=>{
      if(e.key === 'Enter' || e.key === ' '){
        e.preventDefault();
        openDetail(task.id);
      }
    });

    board.appendChild(card);
  });
}

/* ---------- 新增任務 ---------- */
function addTask(){
  let name = taskNameInput.value.trim();
  let total = parseInt(taskTotalInput.value);
  let reward = parseInt(taskRewardInput.value);
  let color = taskColorInput.value;

  if(!name){
    alert('請輸入任務名稱');
    return;
  }
  if(isNaN(total) || total < 1){
    alert('完成次數必須為大於等於 1 的整數');
    return;
  }
  if(isNaN(reward) || reward < 0){
    alert('每次獎勵金必須為大於等於 0 的數字');
    return;
  }

  // 新任務id
  let maxId = data.tasks.reduce((max, t) => t.id > max ? t.id : max, 0);
  const newTask = {
    id: maxId + 1,
    name,
    total,
    done: 0,
    reward,
    color,
    logs: []
  };
  data.tasks.push(newTask);
  saveData(data);
  renderBoard();

  // 清空輸入
  taskNameInput.value = '';
  taskTotalInput.value = '7';
  taskRewardInput.value = '10';
  taskColorInput.value = '#ffd6e8';
}

/* ---------- 刪除任務 ---------- */
function deleteTask(id){
  const idx = data.tasks.findIndex(t=>t.id === id);
  if(idx >= 0){
    data.tasks.splice(idx, 1);
    if(currentTaskId === id) closeDetail();
    saveData(data);
    renderBoard();
    updateStats();
  }
}

/* ---------- 顯示細節視窗 ---------- */
function openDetail(id){
  const task = data.tasks.find(t=>t.id === id);
  if(!task) return;
  currentTaskId = id;
  detailTitle.textContent = task.name;
  detailProg.textContent = `${task.done} / ${task.total}`;
  detail.style.backgroundColor = task.color || '#ffd6e8';
  noteInput.value = '';
  renderLogs(task);
  detail.style.display = 'block';
  noteInput.focus();
}

/* ---------- 關閉細節視窗 ---------- */
function closeDetail(){
  currentTaskId = null;
  detail.style.display = 'none';
}

/* ---------- 完成一次任務 ---------- */
function completeOne(){
  if(currentTaskId === null) return;
  const task = data.tasks.find(t=>t.id === currentTaskId);
  if(!task) return;
  if(task.done >= task.total){
    alert('此任務已完成所有次數');
    return;
  }
  task.done++;
  // 紀錄本次完成資訊與時間
  task.logs.unshift({
    time: getTaiwanNow().toISOString(),
    note: noteInput.value.trim()
  });
  // 清空輸入
  noteInput.value = '';

  saveData(data);
  renderLogs(task);
  detailProg.textContent = `${task.done} / ${task.total}`;
  renderBoard();
  updateStats();
}

/* ---------- 刪除細項紀錄 ---------- */
function deleteLog(taskId, logIndex){
  const task = data.tasks.find(t=>t.id === taskId);
  if(!task) return;
  if(logIndex >= 0 && logIndex < task.logs.length){
    task.logs.splice(logIndex,1);
    task.done = task.logs.length; // 根據紀錄調整完成數量
    saveData(data);
    renderLogs(task);
    detailProg.textContent = `${task.done} / ${task.total}`;
    renderBoard();
    updateStats();
  }
}

/* ---------- 渲染細項紀錄 ---------- */
function renderLogs(task){
  logsDiv.innerHTML = '';
  if(!task.logs || task.logs.length === 0){
    logsDiv.textContent = '尚無完成紀錄';
    return;
  }
  task.logs.forEach((log, idx)=>{
    const div = document.createElement('div');
    div.classList.add('log-item');

    const dt = new Date(log.time);
    const timeStr = dt.toLocaleString('zh-TW', {hour12:false, timeZone: 'Asia/Taipei'});

    const timeDiv = document.createElement('div');
    timeDiv.textContent = timeStr;

    const noteDiv = document.createElement('div');
    noteDiv.textContent = log.note || '(無備註)';

    // 刪除細項按鈕
    const delBtn = document.createElement('button');
    delBtn.textContent = '刪除';
    delBtn.classList.add('del-log-btn');
    delBtn.title = '刪除此完成紀錄';
    delBtn.addEventListener('click', e=>{
      e.stopPropagation();
      if(confirm('確定刪除此完成紀錄？')){
        deleteLog(task.id, idx);
      }
    });

    div.appendChild(timeDiv);
    div.appendChild(noteDiv);
    div.appendChild(delBtn);

    logsDiv.appendChild(div);
  });
}

/* ---------- 更新並顯示統計 ---------- */
function updateStats(){
  let money = 0;
  data.tasks.forEach(t=>{
    money += t.done * t.reward;
  });
  // 檢查本週是否全部完成
  const allDone = data.tasks.length > 0 && data.tasks.every(t=>t.done >= t.total);

  if(allDone){
    // 若已完成整週，增加週獎勵金且更新完成週數與連勝
    if(data.stats.doneWeeks < currentWeekNo){
      data.stats.doneWeeks++;
      data.stats.streak++;
      money += data.meta.weeklyReward;
    }
  } else {
    // 未完成本週，重置連勝
    if(data.stats.doneWeeks < currentWeekNo){
      data.stats.streak = 0;
    }
  }
  data.stats.money = money;

  doneWeeksElem.textContent = data.stats.doneWeeks;
  streakElem.textContent = data.stats.streak;
  moneyElem.textContent = data.stats.money;

  saveData(data);
}

/* ---------- 讀取並渲染歷史紀錄 ---------- */
function renderHistory(){
  historyList.innerHTML = '';
  const weeks = Object.keys(data.history).map(n=>parseInt(n)).sort((a,b)=>b-a);

  if(weeks.length === 0){
    historyList.innerHTML = '<p style="color:#b68ea3; user-select:none;">尚無歷史紀錄</p>';
    return;
  }
  weeks.forEach(weekNo=>{
    const record = data.history[weekNo];
    if(!record) return;

    const container = document.createElement('div');
    container.classList.add('history-week');

    const title = document.createElement('div');
    title.textContent = `第 ${weekNo} 週 (${record.dateRange})`;
    container.appendChild(title);

    const ul = document.createElement('ul');
    record.tasks.forEach(t=>{
      const li = document.createElement('li');
      li.textContent = `${t.name}：完成 ${t.done} / ${t.total} 次`;
      ul.appendChild(li);
    });
    container.appendChild(ul);

    historyList.appendChild(container);
  });
}

/* ---------- 匯出備份 ---------- */
function exportData(){
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `平野週清單備份_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

/* ---------- 匯入備份 ---------- */
function importData(file){
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const obj = JSON.parse(e.target.result);
      if(obj && obj.tasks && obj.meta && obj.stats){
        if(confirm('匯入備份會覆蓋現有資料，確定嗎？')){
          data = obj;
          saveData(data);
          renderBoard();
          updateStats();
          renderHistory();
        }
      } else {
        alert('檔案格式不符');
      }
    } catch {
      alert('讀取檔案失敗');
    }
  };
  reader.readAsText(file);
}

/* ---------- 事件監聽 ---------- */
addTaskBtn.addEventListener('click', addTask);
completeOneBtn.addEventListener('click', completeOne);
closeDetailBtn.addEventListener('click', closeDetail);
exportBtn.addEventListener('click', exportData);
importBtn.addEventListener('click', ()=>importFile.click());
importFile.addEventListener('change', e=>{
  if(e.target.files.length > 0){
    importData(e.target.files[0]);
  }
});

/* 點擊細節外部可關閉 */
window.addEventListener('click', e=>{
  if(detail.style.display === 'block' && !detail.contains(e.target)){
    closeDetail();
  }
});

/* ---------- 初始化 ---------- */
function init(){
  updateDateTime();
  setInterval(() => {
    updateDateTime();
    checkWeeklyReset();
    updateStats();
  }, 1000);

  // 設定週獎勵金
  weeklyRewardInput.value = data.meta.weeklyReward;
  weeklyRewardInput.addEventListener('change', e=>{
    let val = parseInt(e.target.value);
    if(isNaN(val) || val < 0) val = 500;
    data.meta.weeklyReward = val;
    saveData(data);
    updateStats();
  });

  renderBoard();
  updateStats();
  renderHistory();
}

init();
</script>
