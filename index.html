<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>讀書計畫</title>

<style>
    body {
        font-family: "Arial", "Microsoft JhengHei", sans-serif;
        background: linear-gradient(135deg, #ffd6ec, #e4e8ff);
        padding: 20px;
        min-height: 100vh;
        margin: 0;
    }

    .container {
        max-width: 950px;
        margin: auto;
        background: white;
        padding: 25px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        display: none;
    }

    h1 { text-align: center; color: #333; }

    #login-overlay {
        position: fixed;
        inset: 0;
        background: linear-gradient(135deg, #ffd6ec, #e4e8ff);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 100;
    }

    .login-box {
        background: white;
        padding: 40px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .login-box input {
        padding: 10px; border: 1px solid #ddd; border-radius: 10px; width: 200px; margin-bottom: 15px; outline: none;
    }

    .progress-section { margin-bottom: 25px; }
    .progress { width: 100%; background: #eee; border-radius: 10px; margin: 10px 0; }
    .bar { height: 18px; width: 0%; background: #ff8ac9; border-radius: 10px; transition: width 0.4s ease; }

    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th { background: #ffe6f5; padding: 12px; border-bottom: 1px solid #eee; }
    .day-row { border-bottom: 1px solid #eee; }
    .day-info { padding: 15px; font-weight: bold; vertical-align: top; width: 140px; }
    .task-cell { padding: 15px; }

    label { display: flex; align-items: center; margin: 6px 0; cursor: pointer; }
    input[type="checkbox"] { margin-right: 10px; accent-color: #ff8ac9; }
    .editable-text { outline: none; padding: 2px 5px; border-radius: 4px; }
    .editable-text:focus { background: #fff0f7; }

    /* 照片顯示區 */
    .photo-area {
        margin-top: 15px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
    }

    .photo-preview {
        width: 100px;
        height: 100px;
        object-fit: cover;
        border-radius: 10px;
        border: 2px solid #ffe6f5;
    }

    .upload-btn {
        display: inline-block;
        padding: 5px 10px;
        background: #f0f0f0;
        border-radius: 5px;
        font-size: 11px;
        cursor: pointer;
        margin-top: 5px;
    }

    .upload-btn:hover { background: #e0e0e0; }

    .btn { background: #ff8ac9; color: white; border: none; padding: 8px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    .btn-add-day { display: block; width: 100%; margin-top: 20px; padding: 15px; background: #fff; color: #ff8ac9; border: 2px dashed #ff8ac9; }
    .user-tag { text-align: right; font-size: 12px; color: #888; margin-bottom: 10px; }
</style>
</head>

<body>

<div id="login-overlay">
    <div class="login-box">
        <h2 style="color: #ff8ac9;">登入</h2>
        <input type="text" id="username-input" placeholder="請輸入帳號名稱">
        <br>
        <button class="btn" onclick="login()">進入系統</button>
    </div>
</div>

<div class="container" id="main-app">
    <div class="user-tag">帳號：<span id="display-user"></span> | <a href="javascript:location.reload()" style="color:#ff8ac9">切換帳號</a></div>
    <h1>讀書計畫</h1>

    <div class="progress-section">
        <h3 id="progress-percent">總進度 0%</h3>
        <div class="progress"><div class="bar" id="bar"></div></div>
    </div>

    <table>
        <thead>
            <tr><th>日期 / 天數</th><th>計畫與筆記照片</th></tr>
        </thead>
        <tbody id="plan-list"></tbody>
    </table>
    <button class="btn btn-add-day" onclick="addDay()">＋ 新增日期計畫</button>
</div>

<script>
    let currentUser = "";
    let userPlans = [];

    function login() {
        const input = document.getElementById('username-input').value.trim();
        if (!input) return alert("請輸入帳號！");
        currentUser = input;
        document.getElementById('display-user').innerText = currentUser;
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';

        const savedData = localStorage.getItem('study_v4_' + currentUser);
        userPlans = savedData ? JSON.parse(savedData) : [{ date: new Date().toISOString().split('T')[0], tasks: [{text: "新任務", done: false}], photos: [] }];
        render();
    }

    function render() {
        const list = document.getElementById('plan-list');
        list.innerHTML = '';
        userPlans.forEach((day, dIdx) => {
            const tr = document.createElement('tr');
            tr.className = 'day-row';
            tr.innerHTML = `
                <td class="day-info">
                    Day ${dIdx + 1}<br>
                    <input type="date" value="${day.date}" onchange="updateDate(${dIdx}, this.value)">
                </td>
                <td class="task-cell">
                    <div id="tasks-${dIdx}">
                        ${day.tasks.map((t, tIdx) => `
                            <label>
                                <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask(${dIdx}, ${tIdx})">
                                <span class="editable-text" contenteditable="true" onblur="updateTaskText(${dIdx}, ${tIdx}, this.innerText)">${t.text}</span>
                            </label>
                        `).join('')}
                    </div>
                    <button class="btn" style="padding:4px 10px; font-size:11px" onclick="addTask(${dIdx})">+ 任務</button>
                    <label class="upload-btn">📷 上傳照片<input type="file" style="display:none" accept="image/*" onchange="handleUpload(${dIdx}, this)"></label>
                    
                    <div class="photo-area" id="photos-${dIdx}">
                        ${(day.photos || []).map((img, imgIdx) => `<img src="${img}" class="photo-preview" title="點擊刪除" onclick="deletePhoto(${dIdx}, ${imgIdx})">`).join('')}
                    </div>
                </td>
            `;
            list.appendChild(tr);
        });
        save();
    }

    function handleUpload(dIdx, input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            if (!userPlans[dIdx].photos) userPlans[dIdx].photos = [];
            userPlans[dIdx].photos.push(e.target.result);
            render();
        };
        reader.readAsDataURL(file);
    }

    function deletePhoto(dIdx, imgIdx) {
        if(confirm("要刪除這張照片嗎？")) {
            userPlans[dIdx].photos.splice(imgIdx, 1);
            render();
        }
    }

    function save() {
        localStorage.setItem('study_v4_' + currentUser, JSON.stringify(userPlans));
        const allTasks = userPlans.flatMap(p => p.tasks);
        const doneCount = allTasks.filter(t => t.done).length;
        const percent = allTasks.length > 0 ? Math.round((doneCount / allTasks.length) * 100) : 0;
        document.getElementById('bar').style.width = percent + "%";
        document.getElementById('progress-percent').innerText = `總進度 ${percent}% (${doneCount}/${allTasks.length})`;
    }

    // 其他基礎功能
    function addDay() {
        const lastDate = userPlans.length > 0 ? userPlans[userPlans.length-1].date : new Date().toISOString().split('T')[0];
        const nextDate = new Date(lastDate); nextDate.setDate(nextDate.getDate() + 1);
        userPlans.push({ date: nextDate.toISOString().split('T')[0], tasks: [{text: "新任務", done: false}], photos: [] });
        render();
    }
    function addTask(dIdx) { userPlans[dIdx].tasks.push({text: "新任務", done: false}); render(); }
    function toggleTask(dIdx, tIdx) { userPlans[dIdx].tasks[tIdx].done = !userPlans[dIdx].tasks[tIdx].done; save(); }
    function updateTaskText(dIdx, tIdx, val) { userPlans[dIdx].tasks[tIdx].text = val; save(); }
    function updateDate(dIdx, val) { userPlans[dIdx].date = val; save(); }
</script>
</body>
</html>
