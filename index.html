<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>段考10天計畫</title>

<style>
body{
font-family: "Noto Sans", sans-serif;
background:#f6f7fb;
padding:20px;
}

h1{
text-align:center;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

td,th{
padding:10px;
border-bottom:1px solid #eee;
}

th{
background:#f2f4ff;
}

.progress{
width:100%;
background:#eee;
border-radius:10px;
margin-top:10px;
}

.bar{
height:15px;
width:0%;
background:#7c8cff;
border-radius:10px;
}

.day{
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>📚 段考10天計畫</h1>

總進度
<div class="progress">
<div class="bar" id="bar"></div>
</div>

<table>

<tr>
<th>Day</th>
<th>任務</th>
</tr>

<tr>
<td class="day">Day1</td>
<td>
<input type="checkbox"> 日文文法1-2<br>
<input type="checkbox"> 日文單字20<br>
<input type="checkbox"> 英文單字 4-11～13
</td>
</tr>

<tr>
<td class="day">Day2（比賽）</td>
<td>
<input type="checkbox"> 日文文法3<br>
<input type="checkbox"> 英文單字 4-14
</td>
</tr>

<tr>
<td class="day">Day3（比賽）</td>
<td>
<input type="checkbox"> 日文文法4<br>
<input type="checkbox"> 英文單字 4-15
</td>
</tr>

<tr>
<td class="day">Day4</td>
<td>
<input type="checkbox"> 日文文法5-6<br>
<input type="checkbox"> 日文單字20<br>
<input type="checkbox"> 英文單字 4-16～17
</td>
</tr>

<tr>
<td class="day">Day5</td>
<td>
<input type="checkbox"> 日文文法7<br>
<input type="checkbox"> 英文單字 4-18
</td>
</tr>

<tr>
<td class="day">Day6</td>
<td>
<input type="checkbox"> 日文文法8-9<br>
<input type="checkbox"> 英文單字 4-19
</td>
</tr>

<tr>
<td class="day">Day7</td>
<td>
<input type="checkbox"> 日文文法10<br>
<input type="checkbox"> 英文單字 4-20
</td>
</tr>

<tr>
<td class="day">Day8</td>
<td>
<input type="checkbox"> 日文文法11-12<br>
<input type="checkbox"> 英文單字 4-21
</td>
</tr>

<tr>
<td class="day">Day9</td>
<td>
<input type="checkbox"> 日文複習<br>
<input type="checkbox"> 英文單字 5-1
</td>
</tr>

<tr>
<td class="day">Day10</td>
<td>
<input type="checkbox"> N4總複習<br>
<input type="checkbox"> 英文單字 5-2
</td>
</tr>

</table>

</div>

<script>

const checkboxes = document.querySelectorAll("input[type='checkbox']");
const bar = document.getElementById("bar");

checkboxes.forEach(box=>{
box.addEventListener("change",update);
});

function update(){
let checked = document.querySelectorAll("input[type='checkbox']:checked").length;
let total = checkboxes.length;

let percent = (checked/total)*100;

bar.style.width = percent + "%";
}

</script>

</body>
</html>
</body>
</html>
