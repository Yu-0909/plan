<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>平野のTo-do</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to bottom right, #ffd6e8, #d6eaff);
      color: #333;
    }

    .top-bar {
      text-align: center;
      padding: 15px;
      font-size: 1.2em;
      background: #ffe3f3;
      border-bottom: 1px solid #ddd;
    }

    .date-time {
      font-weight: bold;
    }

    h1 {
      text-align: center;
      margin: 20px 0 10px;
      font-size: 2em;
      color: #de5c9d;
    }

    .task-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }

    .task-circle {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background-color: #ffeaf3;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
    }

    .task-circle:hover {
      transform: scale(1.05);
    }

    .task-circle input[type="color"] {
      position: absolute;
      top: 8px;
      right: 8px;
      border: none;
      background: none;
      cursor: pointer;
    }

    .task-name {
      font-weight: bold;
      font-size: 1.2em;
      margin-bottom: 8px;
    }

    .task-count {
      font-size: 1.5em;
      color: #444;
    }

    .task-detail {
      background: white;
      border-radius: 10px;
      padding: 10px;
      margin: 0 auto 20px;
      max-width: 500px;
      display: none;
      flex-direction: column;
    }

    .task-detail h2 {
      text-align: center;
      margin-bottom: 10px;
      color: #de5c9d;
    }

    .subtask-list {
      max-height: 300px;
      overflow-y: auto;
    }

    .subtask {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
      gap: 8px;
    }

    .subtask textarea {
      flex: 1;
      resize: vertical;
      height: 40px;
    }

    .buttons {
      text-align: center;
      margin: 10px 0;
    }

    .buttons button {
      padding: 6px 12px;
      margin: 0 5px;
      border: none;
      background-color: #ff98b5;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    .buttons button:hover {
      background-color: #ff78a5;
    }

    .history {
      padding: 20px;
      background-color: #fff0fa;
    }

    .history h3 {
      color: #b7488b;
    }

    .history ul {
      padding-left: 20px;
    }

    .highlight {
      color: #b7488b;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="top-bar">
    DATE：<span id="date"></span>　TIME：<span id="time"></span>
  </div>

  <h1>平野のTo-do</h1>
  <div class="task-grid" id="taskGrid"></div>

  <div class="task-detail" id="taskDetail">
    <h2 id="detailTitle"></h2>
    <div class="subtask-list" id="subtaskList"></div>
    <div class="buttons">
      <button onclick="addSubtask()">➕ 新增記錄</button>
      <button onclick="closeDetail()">關閉</button>
    </div>
  </div>

  <div class="history">
    <h3>歷史紀錄</h3>
    <ul id="historyList"></ul>
  </div>

  <script>
    const tasks = [
      {
        name: "數學",
        target: 7,
        color: "#ffd6e8",
        log: []
      },
      {
        name: "英文",
        target: 5,
        color: "#d6eaff",
        log: []
      },
      {
        name: "喝水",
        target: 8,
        color: "#e0ffd8",
        log: []
      }
    ];

    const taskGrid = document.getElementById("taskGrid");
    const taskDetail = document.getElementById("taskDetail");
    const subtaskList = document.getElementById("subtaskList");
    const detailTitle = document.getElementById("detailTitle");
    const historyList = document.getElementById("historyList");

    let currentTask = null;

    function renderTasks() {
      taskGrid.innerHTML = "";
      tasks.forEach((task, index) => {
        const div = document.createElement("div");
        div.className = "task-circle";
        div.style.backgroundColor = task.color;
        div.innerHTML = `
          <input type="color" value="${task.color}" onchange="changeColor(${index}, this.value)">
          <div class="task-name">${task.name}</div>
          <div class="task-count">${task.log.length} / ${task.target}</div>
        `;
        div.onclick = () => openDetail(index);
        taskGrid.appendChild(div);
      });
    }

    function openDetail(index) {
      currentTask = tasks[index];
      detailTitle.textContent = currentTask.name;
      taskDetail.style.display = "flex";
      renderSubtasks();
    }

    function closeDetail() {
      taskDetail.style.display = "none";
    }

    function addSubtask() {
      const text = prompt("寫了什麼內容？");
      if (text) {
        const now = new Date();
        const time = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${now.toLocaleTimeString()}`;
        currentTask.log.push({ text, time });
        renderSubtasks();
        renderTasks();
        updateHistory();
      }
    }

    function renderSubtasks() {
      subtaskList.innerHTML = "";
      currentTask.log.forEach((item, i) => {
        const div = document.createElement("div");
        div.className = "subtask";
        div.innerHTML = `
          <input type="checkbox" checked disabled />
          <span>${item.time}</span>
          <textarea readonly>${item.text}</textarea>
        `;
        subtaskList.appendChild(div);
      });
    }

    function updateDateTime() {
      const now = new Date();
      document.getElementById("date").textContent = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}`;
      document.getElementById("time").textContent = now.toLocaleTimeString("zh-TW");
    }

    function updateHistory() {
      historyList.innerHTML = "";
      tasks.forEach((task) => {
        task.log.forEach((item) => {
          const li = document.createElement("li");
          li.innerHTML = `<span class="highlight">${task.name}</span>：${item.text}　<small>${item.time}</small>`;
          historyList.appendChild(li);
        });
      });
    }

    function changeColor(index, value) {
      tasks[index].color = value;
      renderTasks();
    }

    // 初始執行
    renderTasks();
    updateHistory();
    updateDateTime();
    setInterval(updateDateTime, 1000);
  </script>
</body>
</html>
