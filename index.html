<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>計畫</title>

<style>
    /* ✅ 修正版字體載入 */
    @font-face {
      font-family: 'CWLoYen';
      src: url('ChenYuluoyan-2.0-Thin.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    :root {
        --pink: #ff8ac9;
        --blue: #a2b2fc;
        --gray: #f4f4f4;
    }

    body {
        font-family: "Arial", "Microsoft JhengHei", sans-serif;
        background: linear-gradient(135deg, #ffd6ec, #e4e8ff);
        margin: 0; padding: 20px; min-height: 100vh;
    }

    .container {
        max-width: 800px; margin: auto; background: white;
        padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        display: none;
    }

    /* 登入樣式 */
    #login-overlay {
        position: fixed; inset: 0; background: linear-gradient(135deg, #ffd6ec, #e4e8ff);
        display: flex; justify-content: center; align-items: center; z-index: 100;
    }
    .login-box { background: white; padding: 40px; border-radius: 20px; text-align: center; }

    /* 每日卡片樣式 */
    .day-card {
        background: #fff; border: 1px solid #eee; border-radius: 15px;
        margin-bottom: 20px; padding: 15px; position: relative;
        transition: 0.3s;
    }

    .day-header {
        display: flex; justify-content: space-between; align-items: center;
        border-bottom: 2px solid #fff5f9; padding-bottom: 10px; margin-bottom: 10px;
    }

    /* 獨立進度條 */
    .mini-progress-bg {
        width: 100px; height: 8px; background: #eee; border-radius: 5px; overflow: hidden;
    }
    .mini-bar {
        height: 100%; background: var(--pink); width: 0%; transition: 0.4s;
    }

    .task-item { display: flex; align-items: center; margin: 8px 0; gap: 10px; }
    input[type="checkbox"] { accent-color: var(--pink); width: 18px; height: 18px; }

    /* 按鈕 */
    .btn {
        border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer;
        font-weight: bold; transition: 0.2s;
    }
    .btn-pink { background: var(--pink); color: white; }
    .btn-group { background: var(--blue); color: white; margin-top: 10px; }

    /* 隱藏過期提醒 */
    .alert-box {
        background: #fff3cd; color: #856404; padding: 10px; border-radius: 10px;
        margin-bottom: 20px; display: none; font-size: 14px;
    }
</style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2 style="color: var(--pink);"計劃書"</h2>
        <input type="text" id="username-input" placeholder="輸入帳號" style="padding:10px; border-radius:8px; border:1px solid #ddd; width:200px;"><br><br>
        <button class="btn btn-pink" onclick="login()">和朋友一起</button>
    </div>
</div>

<div class="container" id="main-app">
    <div id="cleanup-alert" class="alert-box">
        ⚠️ 偵測到一週前的舊資料，是否 <a href="javascript:void(0)" onclick="autoCleanup()">點此清理</a> 以保持頁面清爽？
    </div>

    <div style="display: flex; justify-content: space-between; align-items: flex-end;">
        <h1>我的計畫</h1>
        <div>
            <button class="btn btn-group" onclick="exportData()">🔗 分享進度給好友</button>
        </div>
    </div>

    <div id="plan-list"></div>
    <button class="btn btn-pink" style="width:100%; padding:15px; margin-top:20px;" onclick="addDay()">＋ 新增今日挑戰</button>
</div>

<script>
    let currentUser = "";
    let userPlans = [];

    function login() {
        const input = document.getElementById('username-input').value.trim();
        if (!input) return;
        currentUser = input;
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';

        const savedData = localStorage.getItem('study_v5_' + currentUser);
        userPlans = savedData ? JSON.parse(savedData) : [];
        
        checkOldData();
        render();
    }

    // 1. 自動檢查一週前的資料
    function checkOldData() {
        const oneWeekAgo = new Date();
        oneWeekAgo.setDate(oneWeekAgo.getDate() - 7);
        
        const hasOld = userPlans.some(p => new Date(p.date) < oneWeekAgo);
        if (hasOld) {
            document.getElementById('cleanup-alert').style.display = 'block';
        }
    }

    function autoCleanup() {
        const oneWeekAgo = new Date();
        oneWeekAgo.setDate(oneWeekAgo.getDate() - 7);
        userPlans = userPlans.filter(p => new Date(p.date) >= oneWeekAgo);
        document.getElementById('cleanup-alert').style.display = 'none';
        render();
    }

    // 2. 渲染 (含獨立進度條)
    function render() {
        const list = document.getElementById('plan-list');
        list.innerHTML = '';

        userPlans.forEach((day, dIdx) => {
            const done = day.tasks.filter(t => t.done).length;
            const total = day.tasks.length;
            const percent = total > 0 ? Math.round((done/total)*100) : 0;

            const card = document.createElement('div');
            card.className = 'day-card';
            card.innerHTML = `
                <div class="day-header">
                    <div>
                        <strong>${day.date}</strong> 
                        <span style="font-size:12px; color:#999; margin-left:10px;">進度：${percent}%</span>
                    </div>
                    <div class="mini-progress-bg">
                        <div class="mini-bar" style="width: ${percent}%"></div>
                    </div>
                </div>
                <div id="tasks-${dIdx}">
                    ${day.tasks.map((t, tIdx) => `
                        <div class="task-item">
                            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask(${dIdx}, ${tIdx})">
                            <span contenteditable="true" onblur="updateText(${dIdx}, ${tIdx}, this.innerText)">${t.text}</span>
                        </div>
                    `).join('')}
                </div>
                <div style="margin-top:10px;">
                    <button class="btn" style="background:#f0f0f0; font-size:11px;" onclick="addTask(${dIdx})">+ 任務</button>
                    <button class="btn" style="background:#fff1f1; color:red; font-size:11px;" onclick="deleteDay(${dIdx})">刪除此天</button>
                </div>
            `;
            list.appendChild(card);
        });
        localStorage.setItem('study_v5_' + currentUser, JSON.stringify(userPlans));
    }

    // 3. 好友監督 (匯出功能)
    function exportData() {
        const dataStr = JSON.stringify({user: currentUser, plans: userPlans});
        const blob = new Blob([dataStr], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        
        // 這裡我們用簡單的複製到剪貼簿模擬
        const dummy = document.createElement("textarea");
        document.body.appendChild(dummy);
        dummy.value = dataStr;
        dummy.select();
        document.execCommand("copy");
        document.body.removeChild(dummy);
        
        alert("進度代碼已複製！你可以傳給好友，讓他們知道你有多拼。");
    }

    // 基礎功能
    function addDay() {
        const today = new Date().toISOString().split('T')[0];
        userPlans.unshift({ date: today, tasks: [{text: "讀書任務", done: false}] });
        render();
    }
    function toggleTask(dIdx, tIdx) { userPlans[dIdx].tasks[tIdx].done = !userPlans[dIdx].tasks[tIdx].done; render(); }
    function updateText(dIdx, tIdx, val) { userPlans[dIdx].tasks[tIdx].text = val; }
    function addTask(dIdx) { userPlans[dIdx].tasks.push({text: "新任務", done: false}); render(); }
    function deleteDay(idx) { if(confirm("確定刪除？")) { userPlans.splice(idx, 1); render(); } }
</script>
</body>
</html>
