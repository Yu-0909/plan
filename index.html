<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>平野のTo-do</title>
  <style>
    body {
      background: #fff0f5;
      font-family: "Segoe UI", sans-serif;
      color: #555;
      margin: 0;
      padding: 0;
    }
    h1 {
      text-align: center;
      font-size: 2.5em;
      color: #d36ba6;
      margin: 1em 0 0.5em;
    }
    #time {
      text-align: center;
      font-size: 1.1em;
      margin-bottom: 1em;
      color: #888;
    }
    #stats {
      text-align: center;
      font-size: 1em;
      margin-bottom: 1em;
    }
    .task-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 0 10px 40px;
    }
    .task {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: #ffe4f0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      flex-direction: column;
      transition: 0.3s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      cursor: pointer;
    }
    .task:hover {
      transform: scale(1.05);
    }
    .task h3 {
      font-size: 1em;
      margin: 0;
    }
    .task .progress {
      font-size: 0.8em;
      color: #666;
    }
    .task input[type="color"] {
      position: absolute;
      top: 5px;
      right: 5px;
      border: none;
      background: none;
    }
    .task-details {
      display: none;
      background: #fff6fa;
      border-radius: 10px;
      padding: 1em;
      margin: 10px auto;
      max-width: 400px;
    }
    .details-visible {
      display: block;
    }
    .entry {
      display: flex;
      align-items: center;
      margin-top: 5px;
    }
    .entry input[type="checkbox"] {
      margin-right: 5px;
    }
    .entry input[type="text"] {
      flex: 1;
      border: none;
      border-bottom: 1px solid #ccc;
      background: transparent;
      padding: 3px;
    }
    #newTaskForm {
      text-align: center;
      margin: 1em auto;
    }
    #newTaskForm input, #newTaskForm button {
      margin: 0.2em;
      padding: 0.4em;
      font-size: 1em;
    }
    .history {
      max-width: 500px;
      margin: auto;
      background: #fff;
      padding: 1em;
      border-radius: 10px;
      font-size: 0.9em;
      margin-bottom: 3em;
    }
    .history h4 {
      margin: 0.5em 0;
    }
  </style>
</head>
<body>
  <h1>平野のTo-do</h1>
  <div id="time"></div>
  <div id="stats"></div>

  <div id="newTaskForm">
    <input type="text" id="taskName" placeholder="任務名稱">
    <input type="number" id="taskCount" min="1" value="1">
    <button onclick="addTask()">新增任務</button>
  </div>

  <div class="task-container" id="taskList"></div>
  <div class="history" id="historyLog"></div>

  <script>
    const taskListEl = document.getElementById("taskList");
    const statsEl = document.getElementById("stats");
    const historyEl = document.getElementById("historyLog");
    const now = new Date();
    const weekStart = new Date("2025-01-06");
    const weekNumber = Math.floor((now - weekStart) / (7 * 24 * 60 * 60 * 1000)) + 1;

    let tasks = JSON.parse(localStorage.getItem("weeklyTasks") || "[]");
    let state = JSON.parse(localStorage.getItem("weeklyState") || `{
      "weekNumber": ${weekNumber},
      "completedWeeks": 0,
      "streak": 0,
      "totalWeeks": ${weekNumber},
      "money": 0,
      "history": {},
      "lastReset": ""
    }`);

    function save() {
      localStorage.setItem("weeklyTasks", JSON.stringify(tasks));
      localStorage.setItem("weeklyState", JSON.stringify(state));
    }

    function updateTime() {
      const now = new Date();
      const date = now.toLocaleDateString("zh-TW", { weekday: "long", year: "numeric", month: "2-digit", day: "2-digit" });
      const time = now.toLocaleTimeString("zh-TW");
      document.getElementById("time").innerText = `${date} ${time}`;
    }

    function renderTasks() {
      taskListEl.innerHTML = "";
      tasks.forEach((task, idx) => {
        const done = task.entries.filter(e => e.checked).length;
        const container = document.createElement("div");
        container.className = "task";
        container.style.background = task.color || "#ffe4f0";
        container.innerHTML = `
          <input type="color" value="${task.color}" onchange="setColor(${idx}, this.value)">
          <h3>${task.name}</h3>
          <div class="progress">${done} / ${task.count}</div>
        `;
        container.onclick = () => toggleDetails(idx);
        taskListEl.appendChild(container);

        const details = document.createElement("div");
        details.className = "task-details";
        details.id = `details-${idx}`;
        for (let i = 0; i < task.count; i++) {
          const entry = document.createElement("div");
          entry.className = "entry";
          entry.innerHTML = `
            <input type="checkbox" ${task.entries[i]?.checked ? "checked" : ""} onchange="toggleEntry(${idx}, ${i})">
            <input type="text" placeholder="備註" value="${task.entries[i]?.text || ""}" oninput="updateText(${idx}, ${i}, this.value)">
          `;
          details.appendChild(entry);
        }
        taskListEl.appendChild(details);
      });

      const allDone = tasks.every(t => t.entries.filter(e => e.checked).length === t.count);
      if (allDone && !state.history[`week${state.weekNumber}`]) {
        state.completedWeeks++;
        state.streak++;
        state.money += 500;
        state.history[`week${state.weekNumber}`] = tasks.map(t => ({
          name: t.name,
          time: new Date().toLocaleString("zh-TW")
        }));
        save();
        renderStats();
      }
    }

    function toggleDetails(idx) {
      const el = document.getElementById(`details-${idx}`);
      el.classList.toggle("details-visible");
    }

    function addTask() {
      const name = document.getElementById("taskName").value.trim();
      const count = parseInt(document.getElementById("taskCount").value);
      if (!name || isNaN(count) || count < 1) return;
      tasks.push({ name, count, entries: Array(count).fill({ checked: false, text: "" }), color: "#ffe4f0" });
      save();
      renderTasks();
    }

    function toggleEntry(taskIdx, entryIdx) {
      tasks[taskIdx].entries[entryIdx].checked = !tasks[taskIdx].entries[entryIdx].checked;
      save();
      renderTasks();
    }

    function updateText(taskIdx, entryIdx, val) {
      tasks[taskIdx].entries[entryIdx].text = val;
      save();
    }

    function setColor(idx, val) {
      tasks[idx].color = val;
      save();
      renderTasks();
    }

    function renderStats() {
      statsEl.innerHTML = `
        🗓️ 第 ${state.weekNumber} 週　
        ✅ 完成週數：${state.completedWeeks}　
        🔁 連勝：${state.streak}　
        💰 獎金：${state.money} 元
      `;
    }

    function checkReset() {
      const now = new Date();
      const today = now.toISOString().split("T")[0];
      const isMonday = now.getDay() === 1;
      const isFive = now.getHours() >= 5;
      if (isMonday && isFive && state.lastReset !== today) {
        state.lastReset = today;
        state.weekNumber++;
        state.totalWeeks++;
        tasks = [];
        save();
        renderTasks();
        renderStats();
      }
    }

    function renderHistory() {
      historyEl.innerHTML = "<h4>📖 歷史紀錄</h4>";
      for (const [week, items] of Object.entries(state.history)) {
        historyEl.innerHTML += `<strong>${week}</strong><ul>` + items.map(i => `<li>${i.name} 完成於 ${i.time}</li>`).join("") + "</ul>";
      }
    }

    setInterval(updateTime, 1000);
    setInterval(checkReset, 60 * 1000);
    updateTime();
    renderStats();
    renderTasks();
    renderHistory();
  </script>
</body>
</html>
