<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>平野のTo-do（粉嫩版）</title>
  <style>
    /* 字體：若你 host 的辰宇落雁體檔案正確，會套用；否則會 fallback */
    @font-face {
      font-family: '辰宇落雁體';
      src: url('https://raw.githubusercontent.com/Yu-0909/TSUKISHIMA/main/ChenYuluoyan-Thin-Monospaced.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    :root{
      --bg1:#fff4fb;
      --card:#fff6fc;
      --accent:#e26a9a;
      --muted:#6b1f4a;
      --soft:#ffdfee;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: "辰宇落雁體", "Noto Sans TC", sans-serif;
      background: linear-gradient(135deg,var(--bg1), #e8f6ff);
      color:#333;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding-bottom:40px;
    }
    header{ text-align:center; margin-top:18px; }
    h1{ color:var(--accent); margin:6px 0 0; font-size:28px; }
    .topbar{
      width:100%; max-width:1100px; display:flex; justify-content:space-between; align-items:center;
      gap:10px; padding:12px 18px; margin-top:10px; font-size:14px;
    }
    .badges{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .badge{
      background:#fff; padding:6px 10px; border-radius:16px; box-shadow:0 6px 18px rgba(0,0,0,0.06);
      font-size:13px;
    }

    /* controls */
    .controls{ width:100%; max-width:1100px; display:flex; gap:8px; align-items:center; justify-content:center; flex-wrap:wrap; padding:12px; }
    input[type="text"], input[type="number"], input[type="color"]{
      padding:8px; border-radius:10px; border:1px solid #efe; outline:none;
      font-size:14px;
    }
    button{ border:none; border-radius:10px; padding:8px 12px; font-size:14px; cursor:pointer; }
    button.primary{ background:var(--accent); color:white; box-shadow:0 6px 14px rgba(226,106,154,0.18); }
    button.ghost{ background:transparent; color:var(--muted); border:1px solid rgba(0,0,0,0.06); }

    /* board */
    .board{ width:100%; max-width:1100px; display:flex; flex-wrap:wrap; gap:16px; justify-content:center; padding:18px; }
    .card{
      width:140px; height:140px; border-radius:999px; display:flex; flex-direction:column; align-items:center; justify-content:center;
      text-align:center; padding:10px; cursor:pointer; box-shadow:0 8px 22px rgba(0,0,0,0.08); transition:transform .15s;
      position:relative;
      font-size:16px;
    }
    .card:hover{ transform:translateY(-6px) scale(1.03); }
    .card .title{ font-weight:700; color:var(--muted); font-size:17px; margin-bottom:6px; }
    .card .prog{ color:#444; font-size:15px; }
    .card input[type="color"]{ position:absolute; top:8px; right:8px; width:28px; height:28px; border-radius:8px; border:none; padding:0; }

    /* detail modal (白色方匡) */
    .detail{
      position:fixed; left:50%; top:14%; transform:translateX(-50%); width:360px; max-width:92%;
      background:#fff; border-radius:14px; box-shadow:0 18px 48px rgba(0,0,0,0.22); display:none; z-index:999;
      padding:16px;
      font-size:16px;
    }
    .detail h3{ margin:0 0 6px; color:var(--accent); font-size:20px; }
    .detail .meta{ font-size:15px; color:#666; margin-bottom:8px; }
    .detail .note{ width:100%; padding:10px; border-radius:10px; border:1px solid #eee; margin-bottom:8px; font-size:15px; }
    .detail .btns{ display:flex; gap:8px; justify-content:flex-end; }
    .detail .btns button{ font-size:15px; padding:8px 14px; }
    .logs{ max-height:220px; overflow:auto; margin-top:10px; border-top:1px dashed #f0e9f2; padding-top:8px; font-size:14px; }
    .log-item{ color:#444; padding:6px 2px; border-bottom:1px solid #fafafa; }

    /* history */
    .history{ width:100%; max-width:1100px; margin-top:18px; padding:12px; background:rgba(255,255,255,0.9); border-radius:12px; box-shadow:0 8px 20px rgba(0,0,0,0.06); font-size:15px; }
    .history h3{ margin:0 0 8px; color:var(--muted); }
    .history-week{ background:#fff7fb; padding:10px; border-radius:8px; margin-bottom:8px; }

    /* responsive */
    @media(max-width:520px){
      .card{ width:120px; height:120px; font-size:14px; }
      .detail{ width:92%; top:10%; font-size:14px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>平野のTo-do</h1>
  </header>

  <div class="topbar">
    <div class="badges">
      <div class="badge">日期：<span id="today">--</span></div>
      <div class="badge">時間：<span id="clock">--</span></div>
    </div>
    <div class="badges">
      <div class="badge">第 <span id="weekNo">--</span> 週</div>
      <div class="badge">連勝：<span id="streak">0</span> 週</div>
      <div class="badge">完成週數：<span id="doneWeeks">0</span></div>
      <div class="badge">獎勳金：$<span id="money">0</span></div>
    </div>
  </div>

  <div class="controls">
    <input id="taskName" type="text" placeholder="任務名稱（例如：數學）" />
    <input id="taskTotal" type="number" min="1" value="7" style="width:80px" />
    <input id="taskReward" type="number" min="0" value="10" style="width:100px" /> <span class="small">每次 $</span>
    <input id="taskColor" type="color" value="#ffd6e8" />
    <button id="addTaskBtn" class="primary">新增任務</button>
    <input id="weeklyRewardInput" type="number" value="500" style="width:110px" />
    <span class="small">每週完成獎勳金</span>
    <button id="exportBtn" class="ghost">匯出備份</button>
    <input id="importFile" type="file" style="display:none" />
    <button id="importBtn" class="ghost">匯入備份</button>
  </div>

  <div class="board" id="board"></div>

  <!-- detail modal -->
  <div class="detail" id="detail">
    <h3 id="detailTitle">任務</h3>
    <div class="meta"><span id="detailProg">0 / 0</span></div>
    <input id="noteInput" class="note" placeholder="輸入本次完成內容（可留空）" />
    <div class="btns">
      <button id="completeOneBtn" class="primary">✅ 完成一次</button>
      <button id="closeDetailBtn" class="ghost">關閉</button>
      <button id="deleteTaskBtn" class="ghost" style="margin-left:auto; color:#d9534f;">🗑 刪除任務</button>
    </div>
    <div class="logs" id="logs"></div>
  </div>

  <div class="history" id="history">
    <h3>歷史紀錄（每週）</h3>
    <div id="historyList"></div>
  </div>

<script>
/* ---------- DATA 結構（localStorage）與常數 ---------- */
const STORAGE_KEY = 'hirano_weekly_v1';
const BASE_WEEK_START = '2025-07-28'; // 以此日所在週為第1週
const MS_PER_DAY = 24*60*60*1000;
const MS_PER_WEEK = 7*MS_PER_DAY;

/* 取得台灣時間（可靠）：將本機時間轉成 UTC 再加 +8 */
function getTaiwanNow(){
  const local = new Date();
  const utc = local.getTime() + (local.getTimezoneOffset() * 60000);
  return new Date(utc + 8*3600000);
}

/* 以日期計算週號（BASE_WEEK_START 當週為第1週） */
function getWeekNumberFromDate(date){
  const base = new Date(BASE_WEEK_START + 'T00:00:00+08:00');
  const diff = date.getTime() - base.getTime();
  if(diff < 0) return 0;
  return Math.floor(diff / MS_PER_WEEK) + 1;
}

/* 週時間範圍字串 */
function getWeekRange(weekNo){
  const base = new Date(BASE_WEEK_START + 'T00:00:00+08:00');
  const start = new Date(base.getTime() + (weekNo-1)*MS_PER_WEEK);
  const end = new Date(start.getTime() + 6*MS_PER_DAY);
  function f(d){ return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`; }
  return `${f(start)} - ${f(end)}`;
}

/* save / load */
function loadData(){
  const raw = localStorage.getItem(STORAGE_KEY);
  if(raw) return JSON.parse(raw);
  return {
    meta: { startDate: BASE_WEEK_START, weeklyReward: 500, lastProcessedWeek: 0 },
    tasks: [],
    stats: { money: 0, weeksDone: 0, streak: 0 }
  };
}
function saveData(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA)); }

/* 匯出 / 匯入 */
function exportBackup(){
  const blob = new Blob([JSON.stringify(DATA, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = `hirano-weekly-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url);
}
function importBackupFile(file){
  const reader = new FileReader();
  reader.onload = e => {
    try{
      const obj = JSON.parse(e.target.result);
      if(obj && obj.tasks && obj.meta){
        if(confirm('確認要以備份內容覆蓋目前資料嗎？（不可回復）')){
          DATA = obj; saveData(); init(); alert('匯入完成');
        }
      } else alert('備份格式不正確');
    }catch(err){ alert('讀取檔案失敗：'+err); }
  };
  reader.readAsText(file);
}

/* 對一週做快照（歷史） */
function snapshotWeek(weekNo){
  return {
    week: weekNo,
    range: getWeekRange(weekNo),
    tasks: DATA.tasks.map(t=>{
      const rec = (t.records && t.records[weekNo]) ? t.records[weekNo] : {count:0, logs:[]};
      return { id:t.id, name:t.name, total:t.totalPerWeek, done:rec.count||0, logs:rec.logs||[] };
    })
  };
}

/* 處理未結算週（即使關機沒開也會在下次開啟時把歷史結算補上） */
function processPendingWeeks(){
  const now = getTaiwanNow();
  const currentWeek = getWeekNumberFromDate(now);
  const isMondayBefore5 = (now.getDay() === 1 && now.getHours() < 5);
  const lastEligibleWeek = currentWeek - (isMondayBefore5 ? 1 : 0);

  let start = (DATA.meta.lastProcessedWeek || 0) + 1;
  if(start < 1) start = 1;
  for(let w = start; w <= lastEligibleWeek; w++){
    let allDone = true;
    let weekRewardSum = 0; // 本週所有任務累計獎金
    for(const t of DATA.tasks){
      const rec = (t.records && t.records[w]) ? t.records[w] : {count:0};
      if((rec.count||0) < (t.totalPerWeek||0)) allDone = false;
      weekRewardSum += (rec.count||0) * (t.unitReward || 0);
    }
    // 加上本週任務獎金
    DATA.stats.money += weekRewardSum;

    // 若整週完成則加額外獎勵金
    if(allDone){
      DATA.stats.money += (DATA.meta.weeklyReward || 0);
      DATA.stats.weeksDone = (DATA.stats.weeksDone || 0) + 1;
      DATA.stats.streak = (DATA.stats.streak || 0) + 1;
    } else {
      DATA.stats.streak = 0;
    }
    DATA.meta['history_'+w] = snapshotWeek(w);
    DATA.meta.lastProcessedWeek = w;
  }
  saveData();
}

/* ------------ UI 與互動 ------------- */
let DATA = loadData();
const board = document.getElementById('board');
const detail = document.getElementById('detail');
const detailTitle = document.getElementById('detailTitle');
const detailProg = document.getElementById('detailProg');
const logsBox = document.getElementById('logs');
const noteInput = document.getElementById('noteInput');
let currentOpenTaskId = null;

/* 初始化 */
function init(){
  document.getElementById('weeklyRewardInput').value = DATA.meta.weeklyReward || 500;
  processPendingWeeks(); // 補做未處理週
  renderAll();
  startClock();
}

/* 時鐘（台灣時間） */
function startClock(){
  function tick(){
    const now = getTaiwanNow();
    document.getElementById('today').textContent = now.toLocaleDateString('zh-TW');
    document.getElementById('clock').textContent = now.toLocaleTimeString('zh-TW');
    document.getElementById('weekNo').textContent = getWeekNumberFromDate(now);
    document.getElementById('money').textContent = DATA.stats.money || 0;
    document.getElementById('streak').textContent = DATA.stats.streak || 0;
    document.getElementById('doneWeeks').textContent = DATA.stats.weeksDone || 0;
  }
  tick(); setInterval(tick, 1000);
}

/* 渲染整個版面 */
function renderAll(){
  renderBoard();
  renderHistory();
}

/* Board（圓形卡片） */
function renderBoard(){
  board.innerHTML = '';
  const now = getTaiwanNow();
  const week = getWeekNumberFromDate(now);
  DATA.tasks.forEach(t => {
    const rec = (t.records && t.records[week]) ? t.records[week] : {count:0, logs:[]};
    const div = document.createElement('div'); div.className='card'; div.style.background = t.color || '#ffd6e8';
    div.innerHTML = `<input type="color" value="${t.color||'#ffd6e8'}" onchange="changeColor(${t.id}, this.value)" />
      <div class="title">${escapeHtml(t.name)}</div>
      <div class="prog">${(rec.count||0)} / ${t.totalPerWeek}</div>`;
    div.addEventListener('click', ()=>openDetail(t.id));
    board.appendChild(div);
  });
}

/* 改顏色 */
function changeColor(id, color){
  const t = DATA.tasks.find(x=>x.id===id);
  if(!t) return;
  t.color = color; saveData(); renderAll();
}

/* 開啟細項白色方匡 */
function openDetail(taskId){
  const t = DATA.tasks.find(x=>x.id===taskId);
  if(!t) return;
  currentOpenTaskId = taskId;
  const now = getTaiwanNow(); 
  const week = getWeekNumberFromDate(now);
  const rec = (t.records && t.records[week]) ? t.records[week] : {count:0, logs:[]};
  detailTitle.textContent = t.name;
  detailProg.textContent = `${rec.count||0} / ${t.totalPerWeek}`;
  noteInput.value = '';
  renderLogs(rec.logs||[]);
  detail.style.display = 'block';
}

/* 關閉細項 */
document.getElementById('closeDetailBtn').addEventListener('click', ()=>{
  detail.style.display = 'none';
  currentOpenTaskId = null;
});

/* 新增任務 */
document.getElementById('addTaskBtn').addEventListener('click', ()=>{
  const name = document.getElementById('taskName').value.trim();
  if(!name){ alert('請輸入任務名稱'); return; }
  const total = parseInt(document.getElementById('taskTotal').value);
  if(isNaN(total) || total<1){ alert('次數需為大於0的數字'); return; }
  const reward = parseInt(document.getElementById('taskReward').value);
  if(isNaN(reward) || reward < 0){ alert('獎勵金額需為非負數'); return; }
  const color = document.getElementById('taskColor').value || '#ffd6e8';

  // 新ID
  let newId = 1;
  if(DATA.tasks.length > 0) newId = Math.max(...DATA.tasks.map(x=>x.id)) + 1;

  DATA.tasks.push({
    id: newId,
    name,
    totalPerWeek: total,
    unitReward: reward,
    color,
    records: {}
  });
  saveData();
  renderAll();

  // 清空輸入框
  document.getElementById('taskName').value = '';
  document.getElementById('taskTotal').value = '7';
  document.getElementById('taskReward').value = '10';
  document.getElementById('taskColor').value = '#ffd6e8';
});

/* 完成一次（只增加次數與紀錄，但不加錢，錢等週結算） */
document.getElementById('completeOneBtn').addEventListener('click', ()=>{
  if(currentOpenTaskId === null) return;
  const t = DATA.tasks.find(x=>x.id===currentOpenTaskId);
  if(!t) return;
  const now = getTaiwanNow();
  const week = getWeekNumberFromDate(now);
  if(!t.records) t.records = {};
  if(!t.records[week]) t.records[week] = {count:0, logs:[]};
  const rec = t.records[week];
  if(rec.count >= t.totalPerWeek){
    alert('本週次數已達上限');
    return;
  }
  const note = noteInput.value.trim();
  rec.count++;
  rec.logs.push({ time: now.toLocaleString('zh-TW'), note });
  saveData();
  openDetail(t.id);
  renderAll();
});

/* 刪除任務 */
document.getElementById('deleteTaskBtn').addEventListener('click', ()=>{
  if(currentOpenTaskId === null) return;
  if(!confirm('確定要刪除此任務嗎？該任務所有紀錄也會被刪除。')) return;
  DATA.tasks = DATA.tasks.filter(x=>x.id !== currentOpenTaskId);
  saveData();
  detail.style.display = 'none';
  currentOpenTaskId = null;
  renderAll();
});

/* 顯示完成紀錄 */
function renderLogs(logs){
  logsBox.innerHTML = '';
  if(logs.length === 0){
    logsBox.innerHTML = '<p style="color:#aaa;">尚無完成紀錄</p>';
    return;
  }
  logs.forEach(l=>{
    const div = document.createElement('div');
    div.className = 'log-item';
    div.textContent = `${l.time} ${l.note ? '｜'+l.note : ''}`;
    logsBox.appendChild(div);
  });
}

/* 歷史紀錄 */
function renderHistory(){
  const container = document.getElementById('historyList');
  container.innerHTML = '';
  const historyWeeks = [];
  for(const key in DATA.meta){
    if(key.startsWith('history_')){
      const w = parseInt(key.split('_')[1]);
      if(!isNaN(w)) historyWeeks.push(w);
    }
  }
  historyWeeks.sort((a,b)=>b-a);
  historyWeeks.forEach(w=>{
    const h = DATA.meta['history_'+w];
    if(!h) return;
    const div = document.createElement('div');
    div.className = 'history-week';
    div.innerHTML = `<strong>第${w}週 (${h.range})</strong><br/>` +
      h.tasks.map(t=>`${escapeHtml(t.name)}：${t.done} / ${t.total}`).join('，');
    container.appendChild(div);
  });
}

/* 幫助函式：HTML escape */
function escapeHtml(text){
  if(!text) return '';
  return text.replace(/[&<>"']/g, function(m){
    switch(m){
      case '&': return '&amp;';
      case '<': return '&lt;';
      case '>': return '&gt;';
      case '"': return '&quot;';
      case "'": return '&#39;';
      default: return m;
    }
  });
}

/* 每週獎勵金設定 */
document.getElementById('weeklyRewardInput').addEventListener('change', e=>{
  let v = parseInt(e.target.value);
  if(isNaN(v) || v < 0) v = 500;
  DATA.meta.weeklyReward = v;
  saveData();
});

/* 匯出匯入按鈕 */
document.getElementById('exportBtn').addEventListener('click', exportBackup);
document.getElementById('importBtn').addEventListener('click', ()=>document.getElementById('importFile').click());
document.getElementById('importFile').addEventListener('change', e=>{
  if(e.target.files.length>0){
    importBackupFile(e.target.files[0]);
    e.target.value = '';
  }
});

/* 頁面載入 */
window.addEventListener('load', init);
</script>
</body>
</html>
