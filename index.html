<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>讀書計畫</title>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
<style>
    /* 載入指定字體 - 請確保 .ttf 檔案與 HTML 放在同一個資料夾 */
    @font-face {
        font-family: 'ChenYuluoyan';
        src: url('ChenYuluoyan-Thin-Monospaced.ttf') format('truetype');
    }

    :root {
        --pink: #ff8ac9;
        --soft-bg: linear-gradient(135deg, #ffd6ec, #e4e8ff);
    }

    body {
        font-family: 'ChenYuluoyan', "Arial", "Microsoft JhengHei", sans-serif;
        background: var(--soft-bg);
        margin: 0;
        padding: 20px;
        min-height: 100vh;
    }

    .container {
        max-width: 900px;
        margin: auto;
        background: rgba(255, 255, 255, 0.95);
        padding: 30px;
        border-radius: 25px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        display: none;
    }

    /* 登入介面 */
    #login-overlay {
        position: fixed; inset: 0; background: var(--soft-bg);
        display: flex; justify-content: center; align-items: center; z-index: 100;
    }
    .login-box { 
        background: white; padding: 40px; border-radius: 20px; text-align: center;
        font-family: 'ChenYuluoyan', sans-serif;
    }

    h1, h2, h3 { color: #444; font-weight: normal; }

    /* 進度條樣式 */
    .progress-section { margin-bottom: 20px; }
    .progress { width: 100%; background: #eee; border-radius: 10px; height: 18px; margin: 10px 0; overflow: hidden; }
    .bar { height: 100%; width: 0%; background: var(--pink); transition: width 0.5s ease; }

    /* 卡片式清單 */
    .day-card {
        background: #fff; border: 1px solid #ffe6f5; border-radius: 15px;
        padding: 20px; margin-bottom: 20px; position: relative;
    }

    .card-header {
        display: flex; justify-content: space-between; align-items: center;
        border-bottom: 1.5px solid #fff0f7; margin-bottom: 15px; padding-bottom: 10px;
    }

    .date-picker {
        font-family: 'ChenYuluoyan', sans-serif;
        border: 1px solid #ffd6ec; border-radius: 5px; padding: 5px; font-size: 1.1em;
    }

    .task-list { margin-bottom: 15px; }
    .task-item { display: flex; align-items: center; margin: 8px 0; gap: 10px; font-size: 1.2em; }
    input[type="checkbox"] { accent-color: var(--pink); width: 20px; height: 20px; }

    /* 照片區 */
    .photo-gallery { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
    .photo-thumb { width: 120px; height: 120px; object-fit: cover; border-radius: 10px; border: 2px solid #fff5f9; cursor: pointer; }

    /* 按鈕樣式 */
    .btn {
        font-family: 'ChenYuluoyan', sans-serif; cursor: pointer; border: none;
        padding: 8px 18px; border-radius: 12px; transition: 0.3s; font-size: 1.1em;
    }
    .btn-pink { background: var(--pink); color: white; }
    .btn-pink:hover { opacity: 0.8; }
    .btn-outline { background: none; border: 1.5px dashed var(--pink); color: var(--pink); width: 100%; padding: 15px; }

    .upload-label { font-size: 0.9em; color: #888; cursor: pointer; text-decoration: underline; }
</style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2 style="color: var(--pink);">進度表</h2>
        <input type="text" id="username" placeholder="輸入您的帳號" style="padding:10px; border-radius:8px; border:1px solid #ddd; font-family:'ChenYuluoyan'"><br><br>
        <button class="btn btn-pink" onclick="login()">開始規劃</button>
    </div>
</div>

<div class="container" id="main-app">
    <div style="text-align: right; font-size: 0.9em; color: #999;">
        帳號：<span id="display-user"></span> | <a href="javascript:location.reload()" style="color:var(--pink)">登出</a>
    </div>

    <h1>讀書計畫進度</h1>

    <div class="progress-section">
        <h3 id="percent-text">目前總進度 0%</h3>
        <div class="progress"><div class="bar" id="main-bar"></div></div>
    </div>

    <div id="plan-list"></div>

    <button class="btn btn-outline" onclick="addDay()">＋ 增加新的日期計畫</button>
</div>

<script>
    // --- 1. Firebase 配置 ---
    const firebaseConfig = {
        apiKey: "AIzaSyAjOMkZ9s_8YLvEb4TdnND9p1GkLvSG6n8",
        authDomain: "yuuuuuuuuu09-8c245.firebaseapp.com",
        databaseURL: "https://yuuuuuuuuu09-8c245-default-rtdb.firebaseio.com", 
        projectId: "yuuuuuuuuu09-8c245",
        storageBucket: "yuuuuuuuuu09-8c245.firebasestorage.app",
        appId: "1:972849961283:web:d309dc5cb8d3ab4f1b77f6"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let currentUser = "";
    let userPlans = [];

    // --- 2. 登入與雲端監聽 ---
    function login() {
        const name = document.getElementById('username').value.trim();
        if (!name) return alert("請輸入帳號！");
        currentUser = name;
        document.getElementById('display-user').innerText = currentUser;
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';

        db.ref('plans/' + currentUser).on('value', (snapshot) => {
            userPlans = snapshot.val() || [];
            render(); 
        });
    }

    // --- 3. 畫面渲染 ---
    function render() {
        const list = document.getElementById('plan-list');
        list.innerHTML = '';

        userPlans.forEach((day, dIdx) => {
            const dayTasks = day.tasks || []; // 安全防護：防範空任務
            const done = dayTasks.filter(t => t.done).length;
            const total = dayTasks.length;
            const percent = total > 0 ? Math.round((done/total)*100) : 0;

            const card = document.createElement('div');
            card.className = 'day-card';
            card.innerHTML = `
                <div class="card-header">
                    <div>
                        <span style="font-size:1.3em">Day ${dIdx + 1}</span>
                        <input type="date" class="date-picker" value="${day.date || ''}" onchange="updateDate(${dIdx}, this.value)">
                    </div>
                    <div style="color: var(--pink)">本日完成度：${percent}%</div>
                </div>
                
                <div class="task-list">
                    ${dayTasks.map((t, tIdx) => `
                        <div class="task-item">
                            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask(${dIdx}, ${tIdx})">
                            <span contenteditable="true" onblur="editTask(${dIdx}, ${tIdx}, this.innerText)">${t.text}</span>
                        </div>
                    `).join('')}
                </div>

                <div style="display:flex; gap:15px; align-items:center">
                    <button class="btn btn-pink" style="font-size:0.8em; padding:5px 10px" onclick="addTask(${dIdx})">+ 任務</button>
                    <label class="upload-label">📷 上傳筆記照片
                        <input type="file" style="display:none" accept
</script>

</body>
</html>
