<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人化讀書計畫系統</title>
    <style>
        :root {
            --primary: #8a99ff;
            --accent: #ff8ab6;
            --bg: #f0f2f5;
        }

        body {
            font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* 登入彈窗樣式 */
        #login-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        /* 主介面樣式 */
        .container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            display: none; /* 登入後才顯示 */
        }

        .header-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .progress-bar {
            height: 12px;
            background: #eee;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            width: 0%;
            transition: 0.5s;
        }

        .day-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            border-left: 6px solid var(--primary);
        }

        .day-meta {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }

        input[type="date"], input[type="text"], .btn {
            border: 1px solid #ddd;
            padding: 8px 12px;
            border-radius: 8px;
            outline: none;
        }

        .btn {
            cursor: pointer;
            background: var(--primary);
            color: white;
            border: none;
            font-weight: bold;
        }

        .btn-logout { background: #666; font-size: 12px; }
        .btn-add-day { width: 100%; padding: 15px; background: white; color: var(--primary); border: 2px dashed var(--primary); margin-top: 10px; }

        .task-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 8px 0;
        }

        .task-row input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent); }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2>🔑 進入系統</h2>
            <p>請輸入您的帳號名稱</p>
            <input type="text" id="username-input" placeholder="帳號名稱...">
            <button class="btn" onclick="login()">開始規劃</button>
        </div>
    </div>

    <div class="container" id="main-app">
        <div class="header-card">
            <div class="user-info">
                <div>
                    Hi, <strong id="display-user">尚未登入</strong>！
                    <button class="btn btn-logout" onclick="logout()">切換帳號</button>
                </div>
                <div id="progress-text">進度 0%</div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="bar"></div>
            </div>
        </div>

        <div id="plan-list"></div>

        <button class="btn-add-day" onclick="addDay()">＋ 新增一天的日期與計畫</button>
    </div>

<script>
    let currentUser = "";
    let userPlans = [];

    // 1. 登入功能
    function login() {
        const input = document.getElementById('username-input').value.trim();
        if (!input) return alert("請輸入帳號！");
        
        currentUser = input;
        document.getElementById('display-user').innerText = currentUser;
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';

        // 從 localStorage 讀取該帳號專屬資料
        const savedData = localStorage.getItem('study_data_' + currentUser);
        userPlans = savedData ? JSON.parse(savedData) : [];
        render();
    }

    function logout() {
        location.reload(); // 簡單重整頁面即登出
    }

    // 2. 渲染畫面
    function render() {
        const list = document.getElementById('plan-list');
        list.innerHTML = '';

        userPlans.forEach((day, dIdx) => {
            const card = document.createElement('div');
            card.className = 'day-card';
            card.innerHTML = `
                <div class="day-meta">
                    <input type="date" value="${day.date}" onchange="updateDate(${dIdx}, this.value)">
                    <button class="btn" style="background:#ff7676" onclick="deleteDay(${dIdx})">刪除</button>
                </div>
                <div id="tasks-${dIdx}">
                    ${day.tasks.map((t, tIdx) => `
                        <div class="task-row">
                            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask(${dIdx}, ${tIdx})">
                            <span contenteditable="true" onblur="updateTaskText(${dIdx}, ${tIdx}, this.innerText)">${t.text}</span>
                        </div>
                    `).join('')}
                </div>
                <div style="margin-top:10px; color:var(--primary); cursor:pointer; font-size:14px" onclick="addTask(${dIdx})">＋ 新增任務</div>
            `;
            list.appendChild(card);
        });
        save();
    }

    // 3. 資料操作
    function addDay() {
        const today = new Date().toISOString().split('T')[0];
        userPlans.push({ date: today, tasks: [{ text: "新任務", done: false }] });
        render();
    }

    function deleteDay(idx) {
        userPlans.splice(idx, 1);
        render();
    }

    function addTask(dIdx) {
        userPlans[dIdx].tasks.push({ text: "新任務", done: false });
        render();
    }

    function toggleTask(dIdx, tIdx) {
        userPlans[dIdx].tasks[tIdx].done = !userPlans[dIdx].tasks[tIdx].done;
        save();
    }

    function updateTaskText(dIdx, tIdx, val) {
        userPlans[dIdx].tasks[tIdx].text = val;
        save();
    }

    function updateDate(dIdx, val) {
        userPlans[dIdx].date = val;
        save();
    }

    // 4. 保存與進度計算
    function save() {
        // 保存該帳號資料
        localStorage.setItem('study_data_' + currentUser, JSON.stringify(userPlans));
        
        // 進度計算
        const allTasks = userPlans.flatMap(p => p.tasks);
        const doneCount = allTasks.filter(t => t.done).length;
        const totalCount = allTasks.length;
        const percent = totalCount > 0 ? Math.round((doneCount / totalCount) * 100) : 0;

        document.getElementById('bar').style.width = percent + "%";
        document.getElementById('progress-text').innerText = `進度 ${percent}% (${doneCount}/${totalCount})`;
    }
</script>
</body>
</html>
