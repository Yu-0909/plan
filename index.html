<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>讀書計畫</title>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
<style>
    @font-face {
        font-family: 'ChenYuluoyan';
        src: url('ChenYuluoyan-Thin-Monospaced.ttf') format('truetype');
    }

    :root {
        --pink: #ff8ac9;
        --soft-bg: linear-gradient(135deg, #ffd6ec, #e4e8ff);
        --purple: #b5a2ff;
    }

    body {
        font-family: 'ChenYuluoyan', "Arial", "Microsoft JhengHei", sans-serif;
        background: var(--soft-bg);
        margin: 0;
        padding: 20px;
        min-height: 100vh;
    }

    .container {
        max-width: 900px;
        margin: auto;
        background: rgba(255, 255, 255, 0.95);
        padding: 30px;
        border-radius: 25px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        display: none;
    }

    /* 登入註冊介面 */
    #login-overlay {
        position: fixed; inset: 0; background: var(--soft-bg);
        display: flex; justify-content: center; align-items: center; z-index: 100;
    }
    .login-box { 
        background: white; padding: 40px; border-radius: 20px; text-align: center;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 320px;
    }
    .login-box input {
        width: 90%; padding: 10px; margin: 8px 0; border-radius: 8px; 
        border: 1px solid #ddd; font-family: 'ChenYuluoyan'; font-size: 1.1em;
    }

    /* 頭像選擇器 */
    .avatar-selector { display: flex; justify-content: center; gap: 10px; margin: 10px 0; }
    .avatar-option { 
        font-size: 2em; cursor: pointer; padding: 5px; border-radius: 50%; 
        border: 2px solid transparent; transition: 0.2s; user-select: none;
    }
    .avatar-option.selected { border-color: var(--pink); background: #fff0f7; }

    /* 使用者資訊區塊 */
    .user-profile-bar {
        display: flex; align-items: center; gap: 15px; margin-bottom: 20px;
        background: #fff5fa; padding: 15px; border-radius: 15px; border: 1px solid #ffe6f2;
    }
    .user-avatar { font-size: 2.5em; background: white; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; border-radius: 50%; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .user-info { flex-grow: 1; }
    .level-badge { background: var(--purple); color: white; padding: 2px 8px; border-radius: 20px; font-size: 0.9em; margin-left: 5px; }
    
    /* 經驗值條 */
    .exp-section { margin-top: 5px; }
    .exp-bar-container { width: 100%; background: #eef0f6; border-radius: 10px; height: 8px; overflow: hidden; margin-top: 4px;}
    .exp-bar { height: 100%; width: 0%; background: var(--purple); transition: width 0.3s; }

    h1, h2, h3 { color: #444; font-weight: normal; }

    /* 進度條樣式 */
    .progress-section { margin-bottom: 20px; }
    .progress { width: 100%; background: #eee; border-radius: 10px; height: 18px; margin: 10px 0; overflow: hidden; }
    .bar { height: 100%; width: 0%; background: var(--pink); transition: width 0.5s ease; }

    /* 卡片式清單 */
    .day-card {
        background: #fff; border: 1px solid #ffe6f5; border-radius: 15px;
        padding: 20px; margin-bottom: 20px; position: relative;
    }
    .card-header {
        display: flex; justify-content: space-between; align-items: center;
        border-bottom: 1.5px solid #fff0f7; margin-bottom: 15px; padding-bottom: 10px;
    }
    .date-picker {
        font-family: 'ChenYuluoyan', sans-serif;
        border: 1px solid #ffd6ec; border-radius: 5px; padding: 5px; font-size: 1.1em;
    }

    .task-list { margin-bottom: 15px; }
    .task-item { display: flex; align-items: center; margin: 8px 0; gap: 10px; font-size: 1.2em; }
    input[type="checkbox"] { accent-color: var(--pink); width: 20px; height: 20px; }

    .photo-gallery { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
    .photo-thumb { width: 120px; height: 120px; object-fit: cover; border-radius: 10px; border: 2px solid #fff5f9; cursor: pointer; }

    .btn {
        font-family: 'ChenYuluoyan', sans-serif; cursor: pointer; border: none;
        padding: 8px 18px; border-radius: 12px; transition: 0.3s; font-size: 1.1em;
    }
    .btn-pink { background: var(--pink); color: white; }
    .btn-pink:hover { opacity: 0.8; }
    .btn-purple { background: var(--purple); color: white; }
    .btn-purple:hover { opacity: 0.8; }
    .btn-outline { background: none; border: 1.5px dashed var(--pink); color: var(--pink); width: 100%; padding: 15px; }
    .upload-label { font-size: 0.9em; color: #888; cursor: pointer; text-decoration: underline; }
</style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2 style="color: var(--pink);" id="auth-title">讀書計畫登入</h2>
        
        <input type="text" id="username" placeholder="輸入帳號">
        <input type="password" id="password" placeholder="輸入密碼">
        
        <div id="avatar-picker-zone" style="display:none;">
            <p style="margin:5px 0; color:#666;">選擇你的個人頭像：</p>
            <div class="avatar-selector">
                <span class="avatar-option selected" onclick="selectAvatar('🐱', this)">🐱</span>
                <span class="avatar-option" onclick="selectAvatar('🐰', this)">🐰</span>
                <span class="avatar-option" onclick="selectAvatar('🦊', this)">🦊</span>
                <span class="avatar-option" onclick="selectAvatar('🐻', this)">🐻</span>
            </div>
        </div>

        <br>
        <div id="auth-buttons" style="margin-top: 10px;">
            <button class="btn btn-pink" onclick="handleLogin()">登入</button>
            <p style="margin-top:15px; font-size:0.9em; color:#888;">還沒有帳號？ <a href="javascript:toggleAuthMode(true)" style="color:var(--purple)">點此註冊</a></p>
        </div>
    </div>
</div>

<div class="container" id="main-app">
    <div class="user-profile-bar">
        <div class="user-avatar" id="my-avatar">🐱</div>
        <div class="user-info">
            <div style="font-size: 1.3em; color: #333;">
                <span id="display-user"></span>
                <span class="level-badge" id="my-level">Lv.1</span>
            </div>
            <div class="exp-section">
                <span style="font-size: 0.8em; color: #777;" id="exp-text">EXP: 0 / 100</span>
                <div class="exp-bar-container"><div class="exp-bar" id="my-exp-bar"></div></div>
            </div>
        </div>
        <div style="font-size: 0.9em; color: #999; text-align: right;">
            <a href="javascript:location.reload()" style="color:var(--pink)">登出</a>
        </div>
    </div>

    <h1>讀書計畫進度</h1>

    <div class="progress-section">
        <h3 id="percent-text">目前總進度 0%</h3>
        <div class="progress"><div class="bar" id="main-bar"></div></div>
    </div>

    <div id="plan-list"></div>

    <button class="btn btn-outline" onclick="addDay()">＋ 增加新的日期計畫</button>
</div>

<script>
    // --- 1. Firebase 配置 ---
    const firebaseConfig = {
        apiKey: "AIzaSyAjOMkZ9s_8YLvEb4TdnND9p1GkLvSG6n8",
        authDomain: "yuuuuuuuuu09-8c245.firebaseapp.com",
        databaseURL: "https://yuuuuuuuuu09-8c245-default-rtdb.firebaseio.com", 
        projectId: "yuuuuuuuuu09-8c245",
        storageBucket: "yuuuuuuuuu09-8c245.firebasestorage.app",
        appId: "1:972849961283:web:d309dc5cb8d3ab4f1b77f6"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let currentUser = "";
    let userPlans = [];
    let userData = { avatar: "🐱", exp: 0 }; // 存放目前使用者的頭像與經驗值
    let selectedAvatar = "🐱"; // 註冊時暫存選中的頭像
    let isRegisterMode = false;

    // 切換登入或註冊介面
    function toggleAuthMode(toRegister) {
        isRegisterMode = toRegister;
        const title = document.getElementById('auth-title');
        const picker = document.getElementById('avatar-picker-zone');
        const btnZone = document.getElementById('auth-buttons');
        
        if (toRegister) {
            title.innerText = "註冊新帳號";
            title.style.color = "var(--purple)";
            picker.style.display = "block";
            btnZone.innerHTML = `
                <button class="btn btn-purple" onclick="handleRegister()">註冊並登入</button>
                <p style="margin-top:15px; font-size:0.9em; color:#888;">已有帳號？ <a href="javascript:toggleAuthMode(false)" style="color:var(--pink)">點此登入</a></p>
            `;
        } else {
            title.innerText = "讀書計畫登入";
            title.style.color = "var(--pink)";
            picker.style.display = "none";
            btnZone.innerHTML = `
                <button class="btn btn-pink" onclick="handleLogin()">登入</button>
                <p style="margin-top:15px; font-size:0.9em; color:#888;">還沒有帳號？ <a href="javascript:toggleAuthMode(true)" style="color:var(--purple)">點此註冊</a></p>
            `;
        }
    }

    // 註冊時選擇頭像
    function selectAvatar(emoji, element) {
        selectedAvatar = emoji;
        document.querySelectorAll('.avatar-option').forEach(el => el.classList.remove('selected'));
        element.classList.add('selected');
    }

    // --- 2. 登入與註冊驗證邏輯 ---
    function handleRegister() {
        const name = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value.trim();
        if (!name || !pass) return alert("請填寫帳號與密碼！");

        // 先檢查帳號使否存在
        db.ref('users/' + name).once('value', (snapshot) => {
            if (snapshot.exists()) {
                alert("該帳號已被註冊，請換一個名字！");
            } else {
                // 寫入新使用者帳密資料
                const newProfile = { password: pass, avatar: selectedAvatar, exp: 0 };
                db.ref('users/' + name).set(newProfile).then(() => {
                    alert("註冊成功！自動為您登入");
                    enterApp(name);
                });
            }
        });
    }

    function handleLogin() {
        const name = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value.trim();
        if (!name || !pass) return alert("請輸入帳號與密碼！");

        db.ref('users/' + name).once('value', (snapshot) => {
            if (snapshot.exists()) {
                const info = snapshot.val();
                if (info.password === pass) {
                    enterApp(name);
                } else {
                    alert("密碼錯誤！");
                }
            } else {
                alert("找不到此帳號，請先註冊！");
            }
        });
    }

    // 登入成功，開啟主程式並監聽
    function enterApp(name) {
        currentUser = name;
        document.getElementById('display-user').innerText = currentUser;
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';

        // 監聽使用者個人資料 (頭像、經驗值)
        db.ref('users/' + currentUser).on('value', (snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.val();
                userData.avatar = data.avatar || "🐱";
                userData.exp = data.exp || 0;
                updateLevelUI();
            }
        });

        // 監聽計畫資料
        db.ref('plans/' + currentUser).on('value', (snapshot) => {
            userPlans = snapshot.val() || [];
            render(); 
        });
    }

    // --- 3. 等級系統算法與 UI 更新 ---
    function updateLevelUI() {
        // 等級公式：每 100 EXP 一級
        const level = Math.floor(userData.exp / 100) + 1;
        const currentExp = userData.exp % 100;
        
        document.getElementById('my-avatar').innerText = userData.avatar;
        document.getElementById('my-level').innerText = `Lv.${level}`;
        document.getElementById('exp-text').innerText = `EXP: ${currentExp} / 100`;
        document.getElementById('my-exp-bar').style.width = currentExp + "%";
    }

    // 當打勾或完成任務時，自動計算總打勾數更新 EXP (一個打勾 = 10 EXP)
    function recalculateUserExp() {
        const all = userPlans.flatMap(p => p.tasks || []);
        const totalDoneCount = all.filter(t => t.done).length;
        const newExp = totalDoneCount * 10; // 一個任務 10 經驗值
        
        // 更新到資料庫中的 users 節點下，這會觸發 updateLevelUI
        db.ref('users/' + currentUser + '/exp').set(newExp);
    }

    // --- 4. 畫面渲染 ---
    function render() {
        const list = document.getElementById('plan-list');
        list.innerHTML = '';

        userPlans.forEach((day, dIdx) => {
            const dayTasks = day.tasks || []; 
            const done = dayTasks.filter(t => t.done).length;
            const total = dayTasks.length;
            const percent = total > 0 ? Math.round((done/total)*100) : 0;

            const card = document.createElement('div');
            card.className = 'day-card';
            card.innerHTML = `
                <div class="card-header">
                    <div>
                        <span style="font-size:1.3em">Day ${dIdx + 1}</span>
                        <input type="date" class="date-picker" value="${day.date || ''}" onchange="updateDate(${dIdx}, this.value)">
                    </div>
                    <div style="color: var(--pink)">本日完成度：${percent}%</div>
                </div>
                
                <div class="task-list">
                    ${dayTasks.map((t, tIdx) => `
                        <div class="task-item">
                            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask(${dIdx}, ${tIdx})">
                            <span contenteditable="true" onblur="editTask(${dIdx}, ${tIdx}, this.innerText)">${t.text}</span>
                        </div>
                    `).join('')}
                </div>

                <div style="display:flex; gap:15px; align-items:center">
                    <button class="btn btn-pink" style="font-size:0.8em; padding:5px 10px" onclick="addTask(${dIdx})">+ 任務</button>
                    <label class="upload-label">📷 上傳筆記照片
                        <input type="file" style="display:none" accept="image/*" onchange="uploadPhoto(${dIdx}, this)">
                    </label>
                    <button class="btn" style="background:#fff1f1; color:red; font-size:0.8em; margin-left:auto" onclick="deleteDay(${dIdx})">刪除此天</button>
                </div>

                <div class="photo-gallery">
                    ${(day.photos || []).map((img, iIdx) => `
                        <img src="${img}" class="photo-thumb" onclick="deletePhoto(${dIdx}, ${iIdx})" title="點擊刪除照片">
                    `).join('')}
                </div>
            `;
            list.appendChild(card);
        });
        calculateTotal();
    }

    // --- 5. 進度條計算 ---
    function calculateTotal() {
        const all = userPlans.flatMap(p => p.tasks || []);
        const done = all.filter(t => t.done).length;
        const percent = all.length > 0 ? Math.round((done / all.length) * 100) : 0;
        document.getElementById('main-bar').style.width = percent + "%";
        document.getElementById('percent-text').innerText = `目前總進度 ${percent}% (${done}/${all.length})`;
    }

    // --- 6. 功能與雲端儲存邏輯 ---
    function addDay() {
        const lastDate = userPlans.length > 0 ? userPlans[userPlans.length-1].date : new Date().toISOString().split('T')[0];
        const next = new Date(lastDate);
        next.setDate(next.getDate() + 1);
        userPlans.push({ date: next.toISOString().split('T')[0], tasks: [{text:"新計畫", done:false}], photos: [] });
        save(); 
    }

    function uploadPhoto(dIdx, input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            if (!userPlans[dIdx].photos) userPlans[dIdx].photos = [];
            userPlans[dIdx].photos.push(e.target.result);
            save(); 
        };
        reader.readAsDataURL(file);
    }

    function deletePhoto(dIdx, pIdx) {
        if (confirm("確定刪除這張照片筆記嗎？")) {
            userPlans[dIdx].photos.splice(pIdx, 1);
            save(); 
        }
    }

    function save() {
        db.ref('plans/' + currentUser).set(userPlans).then(() => {
            // 每次儲存完畢，順便檢查並重新整理經驗值
            recalculateUserExp();
        });
    }

    function deleteDay(idx) { if(confirm("確定要刪除這整天的計畫嗎？")) { userPlans.splice(idx, 1); save(); } }
    function toggleTask(dIdx, tIdx) { userPlans[dIdx].tasks[tIdx].done = !userPlans[dIdx].tasks[tIdx].done; save(); }
    function editTask(dIdx, tIdx, val) { userPlans[dIdx].tasks[tIdx].text = val; save(); }
    function updateDate(dIdx, val) { userPlans[dIdx].date = val; save(); }
    function addTask(dIdx) { 
        if (!userPlans[dIdx].tasks) userPlans[dIdx].tasks = [];
        userPlans[dIdx].tasks.push({text:"新任務", done:false}); 
        save(); 
    }
</script>

</body>
</html>
