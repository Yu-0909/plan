<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>讀書計畫</title>
    <style>
        :root {
            --primary-color: #ff8ac9;
            --bg-gradient: linear-gradient(135deg, #ffd6ec, #e4e8ff);
            --card-bg: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
        }

        h1 {
            text-align: center;
            color: #555;
            margin-bottom: 10px;
        }

        /* 進度條樣式 */
        .progress-container {
            background: #eee;
            border-radius: 20px;
            height: 20px;
            width: 100%;
            margin: 20px 0;
            overflow: hidden;
            border: 2px solid #fff;
        }

        .bar {
            height: 100%;
            width: 0%;
            background: var(--primary-color);
            background: linear-gradient(90deg, #ff8ac9, #ffb3d9);
            transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .stats {
            text-align: right;
            font-size: 0.9em;
            color: #666;
            margin-bottom: 20px;
        }

        /* 列表樣式 */
        .day-section {
            background: white;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 5px solid var(--primary-color);
            transition: transform 0.2s;
        }

        .day-title {
            font-weight: bold;
            font-size: 1.1em;
            color: #444;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 5px 0;
            border-bottom: 1px solid #f9f9f9;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary-color);
        }

        .task-text {
            margin-left: 10px;
            flex-grow: 1;
            outline: none;
        }

        .task-text:focus {
            background: #fff9fc;
            border-bottom: 1px dashed var(--primary-color);
        }

        /* 按鈕樣式 */
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .btn-add {
            background: var(--primary-color);
            color: white;
        }

        .btn-add:hover {
            background: #ff6eb7;
            transform: translateY(-2px);
        }

        .btn-clear {
            background: #f0f0f0;
            color: #888;
        }

        .delete-btn {
            color: #ffc0c0;
            cursor: pointer;
            font-size: 0.8em;
        }

        .delete-btn:hover { color: #ff4d4d; }

    </style>
</head>
<body>

<div class="container">
    <h1>My Study Plan</h1>
    
    <div class="progress-container">
        <div class="bar" id="bar"></div>
    </div>
    <div class="stats" id="statsText">目前進度：0% (0/0)</div>

    <div id="plan-list">
        </div>

    <div class="controls">
        <button class="btn-add" onclick="addNewDay()">➕ 新增一天的計畫</button>
        <button class="btn-clear" onclick="resetProgress()">重置勾選</button>
    </div>
</div>

<script>
    // 初始資料
    let studyData = [
        { day: "Day 1", tasks: ["🇯🇵 日文文法1-2", "🇯🇵 日文單字20", "🇬🇧 英文單字 4-11～13", "🔬 物理1"] },
        { day: "Day 2", tasks: ["🇯🇵 文法3", "🇬🇧 英文4-14"] }
    ];

    const planList = document.getElementById('plan-list');
    const bar = document.getElementById('bar');
    const statsText = document.getElementById('statsText');

    // 初始化渲染
    function init() {
        render();
    }

    function render() {
        planList.innerHTML = '';
        studyData.forEach((item, dayIndex) => {
            const section = document.createElement('div');
            section.className = 'day-section';
            
            let tasksHtml = item.tasks.map((task, taskIndex) => `
                <div class="task-item">
                    <input type="checkbox" onchange="updateProgress()">
                    <span class="task-text" contenteditable="true" onblur="updateTask(${dayIndex}, ${taskIndex}, this.innerText)">${task}</span>
                </div>
            `).join('');

            section.innerHTML = `
                <div class="day-title">
                    <span>${item.day}</span>
                    <span class="delete-btn" onclick="deleteDay(${dayIndex})">刪除此天</span>
                </div>
                ${tasksHtml}
                <div class="task-item" style="opacity: 0.5; font-size: 0.8em; cursor: pointer;" onclick="addTask(${dayIndex})">
                    + 點擊新增任務
                </div>
            `;
            planList.appendChild(section);
        });
        updateProgress();
    }

    // 更新進度條
    function updateProgress() {
        const checkboxes = document.querySelectorAll('input[type="checkbox"]');
        const checked = document.querySelectorAll('input:checked').length;
        const total = checkboxes.length;
        const percent = total === 0 ? 0 : Math.round((checked / total) * 100);
        
        bar.style.width = percent + "%";
        statsText.innerText = `目前進度：${percent}% (${checked}/${total})`;
    }

    // 新增一天的資料
    function addNewDay() {
        const newDayNum = studyData.length + 1;
        studyData.push({
            day: `Day ${newDayNum}`,
            tasks: ["新任務 (點擊編輯)"]
        });
        render();
    }

    // 刪除特定天
    function deleteDay(index) {
        if(confirm("確定要刪除這一天的所有計畫嗎？")) {
            studyData.splice(index, 1);
            render();
        }
    }

    // 新增任務
    function addTask(dayIndex) {
        studyData[dayIndex].tasks.push("新任務");
        render();
    }

    // 更新文字資料同步回原陣列
    function updateTask(dayIndex, taskIndex, newText) {
        studyData[dayIndex].tasks[taskIndex] = newText;
    }

    // 重置所有勾選
    function resetProgress() {
        document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
        updateProgress();
    }

    init();
</script>

</body>
</html>
