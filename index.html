<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>平野のTo-do</title>
  <style>
    @font-face {
      font-family: '辰宇落雁體';
      src: url('https://raw.githubusercontent.com/Yu-0909/TSUKISHIMA/main/ChenYuluoyan-Thin-Monospaced.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    body {
      font-family: "辰宇落雁體", sans-serif;
      background: #fff4f7;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      text-align: center;
      color: #c25f91;
      margin-top: 20px;
    }

    #info {
      margin: 10px 0;
      font-weight: bold;
      color: #b94a7e;
    }

    #task-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
      margin-bottom: 60px;
    }

    .task-card {
      width: 120px;
      height: 120px;
      border-radius: 60px;
      background-color: #ffd6e8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    .task-name {
      font-size: 18px;
      font-weight: bold;
      color: #7a0b4a;
      text-align: center;
      padding: 0 5px;
    }

    .task-progress {
      margin-top: 6px;
      font-size: 16px;
      color: #7a0b4a;
    }

    #detail-box {
      position: fixed;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 0 12px rgba(0,0,0,0.2);
      z-index: 100;
      width: 320px;
      display: none;
    }

    .record-entry {
      font-size: 14px;
      margin-bottom: 4px;
      color: #555;
    }

    #history-container {
      margin-top: 20px;
      max-width: 800px;
      font-size: 14px;
      color: #444;
    }

    #new-task-form {
      margin: 20px;
      text-align: center;
    }

    #color-preview {
      display: inline-block;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      vertical-align: middle;
      margin-left: 8px;
      border: 1px solid #aaa;
    }

    .history-week {
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 10px;
      background: #fff;
    }

    .history-title {
      cursor: pointer;
      font-weight: bold;
      margin-bottom: 5px;
      color: #c25f91;
    }
  </style>
</head>
<body>
  <h1>To-do</h1>
  <div id="info"></div>
  <div id="new-task-form">
    <input type="text" id="new-task-name" placeholder="任務名稱">
    <input type="color" id="new-task-color" value="#ffd6e8">
    <span id="color-preview" style="background-color:#ffd6e8"></span>
    <input type="number" id="new-task-total" min="1" value="5">
    <button onclick="addNewTask()">新增任務</button>
    <button onclick="clearAllTasks()">清空任務</button>
  </div>
  <div id="task-container"></div>
  <div id="detail-box"></div>
  <div id="history-container"></div>

  <script>
    let tasks = JSON.parse(localStorage.getItem("weeklyTasks") || "[]");

    function saveTasks() {
      localStorage.setItem("weeklyTasks", JSON.stringify(tasks));
    }

    function getNow() {
  const nowUTC = new Date();
  const taiwanTime = new Date(nowUTC.getTime() + 8 * 60 * 60 * 1000); // UTC+8
  const hour = taiwanTime.getHours();
  const day = taiwanTime.getDay();
  if (day === 1 && hour < 5) {
    taiwanTime.setDate(taiwanTime.getDate() - 1);
  }
  return taiwanTime;
}

    function calculateCurrentWeek(date) {
      const start = new Date("2025-07-28T05:00:00+08:00");
      const diff = date - start;
      const oneWeek = 7 * 24 * 60 * 60 * 1000;
      return Math.floor(diff / oneWeek) + 1;
    }

    function renderTasks() {
      const container = document.getElementById("task-container");
      container.innerHTML = "";
      const now = getNow();
      const currentWeek = calculateCurrentWeek(now);

      tasks.forEach(task => {
        const record = task.records.find(r => r.week === currentWeek) || { count: 0 };
        const card = document.createElement("div");
        card.className = "task-card";
        card.style.backgroundColor = task.color;

        const nameDiv = document.createElement("div");
        nameDiv.className = "task-name";
        nameDiv.textContent = task.name;
        card.appendChild(nameDiv);

        const progress = document.createElement("div");
        progress.className = "task-progress";
        progress.textContent = `${record.count} / ${task.totalCount}`;
        card.appendChild(progress);

        card.addEventListener("click", () => openDetailBox(task));
        container.appendChild(card);
      });
    }

    function openDetailBox(task) {
      const box = document.getElementById("detail-box");
      const now = getNow();
      const currentWeek = calculateCurrentWeek(now);
      const record = task.records.find(r => r.week === currentWeek) || { count: 0, logs: [] };
      const logsHtml = (record.logs || []).map(log => `<div class='record-entry'>${log}</div>`).join("");

      box.innerHTML = `
        <h3>${task.name}</h3>
        <p>進度：${record.count} / ${task.totalCount}</p>
        <input type="text" id="log-content" placeholder="內容備註"><br><br>
        <button onclick="addLog(${task.id})">+1 次</button>
        <button onclick="deleteTask(${task.id})">刪除任務</button>
        <div style="margin-top: 10px">${logsHtml}</div>
        <button onclick="closeDetailBox()">關閉</button>
      `;
      box.style.display = "block";
    }

    function addLog(taskId) {
      const now = getNow();
      const currentWeek = calculateCurrentWeek(now);
      const task = tasks.find(t => t.id === taskId);
      let record = task.records.find(r => r.week === currentWeek);
      if (!record) {
        record = { week: currentWeek, count: 0, logs: [] };
        task.records.push(record);
      }
      const content = document.getElementById("log-content").value.trim();
      record.count++;
      const log = `${now.toLocaleString()}：完成${content ? ` - ${content}` : ""}`;
      record.logs.push(log);
      saveTasks();
      renderTasks();
      openDetailBox(task);
    }

    function deleteTask(taskId) {
      tasks = tasks.filter(t => t.id !== taskId);
      saveTasks();
      closeDetailBox();
      renderTasks();
      renderHistory();
    }

    function clearAllTasks() {
      tasks = [];
      saveTasks();
      renderTasks();
      renderHistory();
    }

    function closeDetailBox() {
      document.getElementById("detail-box").style.display = "none";
    }

    function renderInfo() {
      const now = getNow();
      const week = calculateCurrentWeek(now);
      document.getElementById("info").textContent = `目前是第 ${week} 週（${now.toLocaleString()}）`;
    }

    function renderHistory() {
      const container = document.getElementById("history-container");
      container.innerHTML = "<h3>歷史紀錄</h3>";
      const weekMap = {};

      tasks.forEach(task => {
        task.records.forEach(record => {
          if (!weekMap[record.week]) weekMap[record.week] = [];
          weekMap[record.week].push({ name: task.name, ...record });
        });
      });

      const weeks = Object.keys(weekMap).sort((a,b) => b - a);
      weeks.forEach(w => {
        const startDate = new Date("2025-07-28T05:00:00+08:00");
        startDate.setDate(startDate.getDate() + (w - 1) * 7);
        const endDate = new Date(startDate);
        endDate.setDate(endDate.getDate() + 6);

        const weekDiv = document.createElement("div");
        weekDiv.className = "history-week";

        const title = document.createElement("div");
        title.className = "history-title";
        title.textContent = `第 ${w} 週（${startDate.toLocaleDateString()} ~ ${endDate.toLocaleDateString()}）`;
        title.onclick = () => {
          detailDiv.style.display = detailDiv.style.display === "none" ? "block" : "none";
        };

        const detailDiv = document.createElement("div");
        detailDiv.style.display = "none";
        weekMap[w].forEach(r => {
          const logList = (r.logs || []).map(l => `<li>${l}</li>`).join("");
          detailDiv.innerHTML += `<div>${r.name}：${r.count} 次<ul>${logList}</ul></div>`;
        });

        weekDiv.appendChild(title);
        weekDiv.appendChild(detailDiv);
        container.appendChild(weekDiv);
      });
    }

    function addNewTask() {
      const name = document.getElementById("new-task-name").value.trim();
      const color = document.getElementById("new-task-color").value;
      const totalCount = parseInt(document.getElementById("new-task-total").value);
      if (!name || !totalCount) return;
      const newTask = {
        id: Date.now(),
        name,
        color,
        totalCount,
        records: []
      };
      tasks.push(newTask);
      saveTasks();
      renderTasks();
      document.getElementById("new-task-name").value = "";
    }

    document.getElementById("new-task-color").addEventListener("input", e => {
      document.getElementById("color-preview").style.backgroundColor = e.target.value;
    });

    function init() {
      renderTasks();
      renderInfo();
      renderHistory();
    }

    init();
  </script>
</body>
</html>
